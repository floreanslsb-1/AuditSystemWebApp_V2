<script>
// ============================================================
//  Page_MyTask.html
//  Semua task yang perlu ditindaklanjuti user
// ============================================================

Pages['mytask'] = async function(container) {
  container.innerHTML =
    '<div class="page-loader"><div class="spinner dark"></div><span>Memuat tugas...</span></div>';

  var period = App.activePeriod;
  if (!period) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<i data-lucide="calendar-off" style="width:48px;height:48px;opacity:.3;margin-bottom:16px"></i>' +
        '<div class="empty-title">Tidak Ada Periode Aktif</div>' +
        '<div class="empty-desc">My Task hanya tersedia saat periode audit aktif.</div>' +
      '</div>';
    lucide.createIcons();
    return;
  }

  try {
    var results  = await Promise.all([
      cachedApi('GET_AGENDAS_BY_PERIOD',     { period_id: period.period_id }, 30),
      cachedApi('GET_ALL_FINDINGS_BY_PERIOD', { period_id: period.period_id }, 15),
    ]);
    var agendas  = results[0];
    var findings = results[1];

    findings.forEach(function(f) {
      f._agenda = agendas.find(function(a) { return a.agenda_id === f.agenda_id; });
    });

    var tasks = await _buildTaskList(findings, agendas, period);

    _renderMyTask(container, tasks, period);
  } catch(err) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<i data-lucide="alert-triangle" style="width:48px;height:48px;opacity:.3;margin-bottom:16px"></i>' +
        '<div class="empty-title">Gagal Memuat</div>' +
        '<div class="empty-desc">' + escHtml(err.message) + '</div>' +
      '</div>';
    lucide.createIcons();
  }
};

// ── Build task list ───────────────────────────────────────────

async function _buildTaskList(findings, agendas, period) {
  var p     = App.profile || {};
  var tasks = [];

  // ── 1. VERIFIKASI TEMUAN (Koordinator) ───────────────────
  if (p.isKoordinator) {
    var pendingVerif = {};
    findings
      .filter(function(f) {
        return f.finding_status === 'PENDING_VERIFICATION';
      })
      .forEach(function(f) {
        var aid = f.agenda_id;
        if (!pendingVerif[aid]) {
          pendingVerif[aid] = {
            type:       'VERIFIKASI',
            badge:      'badge-amber',
            label:      'Verifikasi Temuan',
            agenda:     f._agenda,
            agenda_id:  aid,
            period_id:  period.period_id,
            findings:   [],
            icon:       'shield-check',
          };
        }
        pendingVerif[aid].findings.push(f);
      });
    Object.values(pendingVerif).forEach(function(t) { tasks.push(t); });
  }

  // ── 2. ISI TPP (Auditee — DeptHead dikecualikan) ─────────
  if (p.isAuditee && !p.isDeptHead) {
    findings
      .filter(function(f) {
        return f.finding_status === 'OPEN' &&
          f._agenda && _isAuditeeOf(f._agenda, p.email);
      })
      .forEach(function(f) {
        tasks.push({
          type:       'ISI_TPP',
          badge:      'badge-blue',
          label:      'Isi TPP',
          agenda:     f._agenda,
          agenda_id:  f.agenda_id,
          period_id:  period.period_id,
          finding:    f,
          result_id:  f.result_id,
          icon:       'wrench',
          desc:       '#' + f.nomor_persyaratan + '.' + f.check_item_no +
                      ' · ' + escHtml(f._agenda ? f._agenda.dept : ''),
        });
      });
  }

  // ── 3. UPLOAD IMPLEMENTASI (Auditee — DeptHead dikecualikan) ─────────────
  if (p.isAuditee) {
    findings
      .filter(function(f) {
        return f.finding_status === 'OPEN_IMPL' &&
          f._agenda && _isAuditeeOf(f._agenda, p.email);
      })
      .forEach(function(f) {
        tasks.push({
          type:       'UPLOAD_IMPL',
          badge:      'badge-purple',
          label:      'Upload Implementasi',
          agenda:     f._agenda,
          agenda_id:  f.agenda_id,
          period_id:  period.period_id,
          finding:    f,
          result_id:  f.result_id,
          icon:       'camera',
          desc:       '#' + f.nomor_persyaratan + '.' + f.check_item_no +
                      ' · ' + escHtml(f._agenda ? f._agenda.dept : ''),
        });
      });
  }

// ── 4 & 5. APPROVAL TPP / IMPLEMENTASI ───────────────────
// Finding_status sudah embed stage & level — tidak perlu baca APPROVAL_LOG
// Filter langsung berdasarkan status dan match ke profile user

  var APPROVAL_STATUS_MAP = {
    'APP_DEPT_HEAD':   { type: 'APPROVAL_IMPL', label: 'Review Implementasi', badge: 'badge-purple', icon: 'upload-cloud', matchFn: function(p, ag) { return !!p.isDeptHead && ag && p.deptHeadAreas && p.deptHeadAreas.indexOf(ag.area_id) !== -1; } },
    'APP_AUDITOR':     { type: 'APPROVAL_IMPL', label: 'Review Implementasi', badge: 'badge-purple', icon: 'upload-cloud', matchFn: function(p, ag) { return !!p.isAuditor  && ag && _emailInCsv(ag.auditor_emails, p.email); } },
    'APP_KOORDINATOR': { type: 'APPROVAL_IMPL', label: 'Approval Impl Final', badge: 'badge-teal',   icon: 'upload-cloud', matchFn: function(p)     { return !!p.isKoordinator; } },
  };

  findings.forEach(function(f) {
    var meta = APPROVAL_STATUS_MAP[f.finding_status];
    if (!meta) return;                           // status bukan approval status
    var ag = f._agenda;
    if (!meta.matchFn(p, ag)) return;            // user tidak berhak di status ini

    tasks.push({
      type:      meta.type,
      badge:     meta.badge,
      label:     meta.label,
      agenda:    ag,
      agenda_id: f.agenda_id,
      period_id: period.period_id,
      finding:   f,
      result_id: f.result_id,
      icon:      meta.icon,
      desc:      '#' + f.nomor_persyaratan + '.' + f.check_item_no +
                 ' · ' + escHtml(ag ? ag.dept : ''),
    });
  });

  return tasks;
}

function _isAuditeeOf(agenda, email) {
  if (!agenda || !agenda.auditee_emails || !email) return false;
  var target = String(email).trim().toLowerCase();
  return String(agenda.auditee_emails).split(',')
    .map(function(e) { return e.trim().toLowerCase(); })
    .indexOf(target) !== -1;
}

function _emailInCsv(csv, email) {
  if (!csv || !email) return false;
  var target = String(email).trim().toLowerCase();
  return String(csv).split(',')
    .map(function(e) { return e.trim().toLowerCase(); })
    .indexOf(target) !== -1;
}

// ── Render My Task ────────────────────────────────────────────

function _renderMyTask(container, tasks, period) {
  var totalTasks = tasks.length;

  var listHtml = '';
  if (!tasks.length) {
    listHtml =
      '<div class="card"><div class="card-body empty-state" style="padding:60px">' +
        '<i data-lucide="party-popper" style="width:48px;height:48px;opacity:.2;margin-bottom:16px"></i>' +
        '<div class="empty-title">Tidak Ada Tugas</div>' +
        '<div class="empty-desc">Semua sudah beres. Tidak ada yang perlu ditindaklanjuti saat ini.</div>' +
      '</div></div>';
  } else {
    // Group by type
    var verifikasiTasks   = tasks.filter(function(t) { return t.type === 'VERIFIKASI'; });
    var isiTppTasks       = tasks.filter(function(t) { return t.type === 'ISI_TPP'; });
    var uploadImplTasks   = tasks.filter(function(t) { return t.type === 'UPLOAD_IMPL'; });
    var approvalImplTasks = tasks.filter(function(t) { return t.type === 'APPROVAL_IMPL'; });

    // Helper: render satu section dengan header + table
    function _taskSection(sectionTitle, sectionIcon, sectionColor, sectionTasks, massApproveBtn) {
      if (!sectionTasks.length) return '';
      return '<div class="card mb-16">' +
        // Section header
        '<div style="padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg);' +
            'display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">' +
          '<span style="display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:' + sectionColor + '">' +
            sectionTitle +
            '<span style="font-size:11px;font-weight:600;padding:1px 7px;border-radius:10px;' +
                'background:' + sectionColor + '18;color:' + sectionColor + '">' +
              sectionTasks.length +
            '</span>' +
          '</span>' +
          (massApproveBtn || '') +
        '</div>' +
        // Table
        '<div class="table-wrap"><table>' +
          '<thead><tr>' +
            (sectionTasks[0] && sectionTasks[0].type === 'VERIFIKASI'
              ? '<th style="width:40px;text-align:center">No</th>' +
                '<th>Dept / Bagian</th>' +
                '<th>Auditor</th>' +
                '<th style="width:110px;text-align:center">Jml Temuan</th>' +
                '<th style="width:120px">Waktu Selesai</th>' +
                '<th style="width:48px"></th>'
              : sectionTasks[0] && sectionTasks[0].type === 'ISI_TPP'
              ? '<th style="width:40px;text-align:center">No</th>' +
                '<th style="width:160px">Result ID</th>' +
                '<th style="width:130px">Dept / Bagian</th>' +
                '<th>Deskripsi Temuan</th>' +
                '<th style="width:130px">Lokasi Temuan</th>' +
                '<th style="width:90px;text-align:center">Bukti</th>' +
                '<th style="width:48px"></th>'
              : sectionTasks[0] && sectionTasks[0].type === 'UPLOAD_IMPL'
              ? '<th style="width:40px;text-align:center">No</th>' +
                '<th style="width:130px">Result ID</th>' +
                '<th style="width:100px">Dept / Bagian</th>' +
                '<th>Deskripsi Temuan</th>' +
                '<th style="width:100px">Lokasi</th>' +
                '<th style="width:140px">Status Correction</th>' +
                '<th style="width:150px">Status Corrective Action</th>' +
                '<th style="width:48px"></th>'
              : sectionTasks[0] && sectionTasks[0].type === 'APPROVAL_IMPL'
              ? '<th style="width:40px;text-align:center">No</th>' +
                '<th style="width:130px">Result ID</th>' +
                '<th style="width:100px">Dept / Bagian</th>' +
                '<th>Deskripsi Temuan</th>' +
                '<th style="width:100px">Lokasi</th>' +
                '<th style="width:140px">Due Date</th>' +
                '<th style="width:48px"></th>'
              : '<th>Detail</th>' +
                '<th style="width:150px">Area</th>' +
                '<th style="width:48px"></th>'
            ) +
          '</tr></thead>' +
          '<tbody>' +
            sectionTasks.map(function(t) {
              var globalIdx = tasks.indexOf(t);
              var areaName  = t.agenda ? escHtml(t.agenda.dept) : '—';
              var detailHtml = '';
              if (t.type === 'VERIFIKASI') {
                // Tabel verifikasi punya kolom sendiri — render sebagai row khusus
                var ag         = t.agenda || {};
                var auditorStr = ag.auditor_emails
                  ? ag.auditor_emails.split(',').map(function(e) {
                      return '<span style="display:inline-block;padding:1px 7px;border-radius:10px;' +
                        'background:var(--bg);border:1px solid var(--border);font-size:11px;margin:1px">' +
                        escHtml(e.trim().split('@')[0]) + '</span>';
                    }).join('')
                  : '—';
                // Waktu selesai = agreement_at (saat auditor submit agreement)
                var waktuSelesai = '—';
                if (ag.agreement_at) {
                  var _agAt    = new Date(ag.agreement_at);
                  var _now     = new Date();
                  var _diffMs  = _now - _agAt;
                  var _diffMin = Math.floor(_diffMs / 60000);
                  var _diffH   = Math.floor(_diffMs / 3600000);
                  var _diffD   = Math.floor(_diffMs / 86400000);
                  if (_diffMin < 1) {
                    waktuSelesai = 'Baru saja';
                  } else if (_diffH < 1) {
                    waktuSelesai = _diffMin + ' menit lalu';
                  } else if (_diffH < 24) {
                    waktuSelesai = _diffH + ' jam lalu';
                  } else if (_diffD === 1) {
                    waktuSelesai = 'Kemarin';
                  } else if (_diffD < 7) {
                    waktuSelesai = _diffD + ' hari lalu';
                  } else {
                    waktuSelesai = formatDate(ag.agreement_at);
                  }
                }
                var verifIdx = sectionTasks.indexOf(t);
                return '<tr style="cursor:pointer" onclick="_openTaskDetail(' + globalIdx + ')" ' +
                  'onmouseover="this.style.background=\'var(--bg)\'" ' +
                  'onmouseout="this.style.background=\'\'">' +
                  '<td style="text-align:center;font-size:12px;color:var(--text-muted);font-weight:600">' + (verifIdx + 1) + '</td>' +
                  '<td style="font-size:12px;font-weight:600">' + areaName + '</td>' +
                  '<td>' + auditorStr + '</td>' +
                  '<td style="text-align:center">' +
                    '<span style="display:inline-flex;align-items:center;justify-content:center;' +
                      'width:26px;height:26px;border-radius:50%;background:var(--rose,#f43f5e)18;' +
                      'color:var(--rose,#f43f5e);font-size:13px;font-weight:700">' +
                      t.findings.length +
                    '</span>' +
                  '</td>' +
                  '<td style="font-size:12px;color:var(--text-muted)">' + waktuSelesai + '</td>' +
                  '<td><i data-lucide="chevron-right" style="width:14px;height:14px;color:var(--text-muted)"></i></td>' +
                '</tr>';
              } else if (t.type === 'ISI_TPP') {
                var tppIdx   = sectionTasks.indexOf(t);
                var f        = t.finding || {};
                var fotoUrls = (f.foto_urls || '').split(',').filter(Boolean);
                var fotoBtnHtml = fotoUrls.length
                  ? fotoUrls.map(function(url) {
                      return '<a href="' + escHtml(url) + '" target="_blank" ' +
                        'onclick="event.stopPropagation()" ' +
                        'class="btn btn-outline btn-sm" style="font-size:10px;padding:2px 6px">' +
                        '<i data-lucide="image" style="width:11px;height:11px"></i>' +
                      '</a>';
                    }).join('')
                  : '<span style="font-size:11px;color:var(--text-muted)">—</span>';

                return '<tr style="cursor:pointer" onclick="_openTaskDetail(' + globalIdx + ')" ' +
                  'onmouseover="this.style.background=\'var(--bg)\'" ' +
                  'onmouseout="this.style.background=\'\'">' +
                  '<td style="text-align:center;font-size:12px;color:var(--text-muted);font-weight:600">' + (tppIdx + 1) + '</td>' +
                  '<td class="td-mono" style="font-size:11px">' + escHtml(t.result_id || '') + '</td>' +
                  '<td class="text-sm">' + areaName + '</td>' +
                  '<td style="font-size:12px">' +
                    '<div style="font-weight:500">' + escHtml(f.deskripsi_temuan || '—') + '</div>' +
                  '</td>' +
                  '<td style="font-size:12px;color:var(--text-muted)">' + escHtml(f.lokasi_temuan || '—') + '</td>' +
                  '<td style="text-align:center" onclick="event.stopPropagation()">' +
                    '<div style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap">' + fotoBtnHtml + '</div>' +
                  '</td>' +
                  '<td><i data-lucide="chevron-right" style="width:14px;height:14px;color:var(--text-muted)"></i></td>' +
                '</tr>';
              } else if (t.type === 'UPLOAD_IMPL') {
                var implIdx  = sectionTasks.indexOf(t);
                var fi       = t.finding || {};
                var today_ui = new Date(); today_ui.setHours(0,0,0,0);

                // Helper: hitung status per jenis (correction / CA)
                var _implStatus = function(dueStr, submittedAt, isRejected) {
                  var due = dueStr ? new Date(dueStr) : null;
                  var dueDay = due ? new Date(due.getFullYear(), due.getMonth(), due.getDate()) : null;
                  var isOverdue = dueDay && today_ui > dueDay;

                  // Sudah submit DAN tidak sedang dalam status reject (finding masih locked di approval)
                  if (submittedAt && !isRejected) {
                    var submitDate = new Date(submittedAt);
                    submitDate.setHours(0,0,0,0);
                    var submitOverdue = dueDay && submitDate > dueDay;
                    if (submitOverdue) {
                      return { text: 'Submitted (Overdue)', color: 'var(--rose,#f43f5e)' };
                    }
                    return { text: 'Submitted', color: 'var(--text)' };
                  }
                  if (!due) return { text: '—', color: 'var(--text-muted)' };
                  if (isOverdue) {
                    return { text: 'Overdue', color: 'var(--rose,#f43f5e)' };
                  }
                  var diffDays = Math.ceil((dueDay - today_ui) / 86400000);
                  if (diffDays === 0) return { text: 'Due hari ini', color: 'var(--amber,#f59e0b)' };
                  return { text: 'Due in ' + diffDays + ' hari', color: 'var(--text)' };
                };

                // isRejected: finding sudah pernah masuk approval tapi di-reject → kembali ke OPEN_IMPL
                // Correction: kalau sudah disubmit dan finding_status masih OPEN_IMPL, berarti
                //   correction memang belum masuk approval (tidak pernah di-reject), tetap "Submitted"
                // CA: kalau impl_submitted_at ada tapi finding_status OPEN_IMPL → pernah di-reject
                var caRejected = !!(fi.impl_submitted_at && fi.finding_status === 'OPEN_IMPL');
                var corrStatus = _implStatus(fi.due_date_correction,       fi.impl_correction_submitted_at, false);
                var caStatus   = _implStatus(fi.due_date_corrective_action, fi.impl_submitted_at,           caRejected);

                return '<tr style="cursor:pointer" onclick="_openTaskDetail(' + globalIdx + ')" ' +
                  'onmouseover="this.style.background=\'var(--bg)\'" ' +
                  'onmouseout="this.style.background=\'\'">' +
                  '<td style="text-align:center;font-size:12px;color:var(--text-muted);font-weight:600">' + (implIdx + 1) + '</td>' +
                  '<td class="td-mono" style="font-size:11px">' + escHtml(t.result_id || '') + '</td>' +
                  '<td style="font-size:12px;font-weight:600">' + areaName + '</td>' +
                  '<td style="font-size:12px">' + escHtml(fi.deskripsi_temuan || '—') + '</td>' +
                  '<td style="font-size:12px;color:var(--text-muted)">' + escHtml(fi.lokasi_temuan || '—') + '</td>' +
                  '<td style="font-size:12px;color:' + corrStatus.color + '">' + corrStatus.text + '</td>' +
                  '<td style="font-size:12px;color:' + caStatus.color + '">' + caStatus.text + '</td>' +
                  '<td><i data-lucide="chevron-right" style="width:14px;height:14px;color:var(--text-muted)"></i></td>' +
                '</tr>';
              } else {
                var fi       = t.finding || {};
                var today_ap = new Date(); today_ap.setHours(0,0,0,0);
                var caDue_ap = fi.due_date_corrective_action ? new Date(fi.due_date_corrective_action) : null;
                var caDueDay = caDue_ap ? new Date(caDue_ap.getFullYear(), caDue_ap.getMonth(), caDue_ap.getDate()) : null;
                var caOverdue_ap = caDueDay && today_ap > caDueDay;
                var rowNo_ap = sectionTasks.indexOf(t) + 1;
                return '<tr style="cursor:pointer" onclick="_openTaskDetail(' + globalIdx + ')" ' +
                  'onmouseover="this.style.background=\'var(--bg)\'" ' +
                  'onmouseout="this.style.background=\'\'">' +
                  '<td style="text-align:center;font-size:12px;color:var(--text-muted)">' + rowNo_ap + '</td>' +
                  '<td class="td-mono" style="font-size:11px">' + escHtml(t.result_id || '') + '</td>' +
                  '<td style="font-size:12px;font-weight:600">' + areaName + '</td>' +
                  '<td style="font-size:12px">' + escHtml(fi.deskripsi_temuan || '—') + '</td>' +
                  '<td style="font-size:12px;color:var(--text-muted)">' + escHtml(fi.lokasi_temuan || '—') + '</td>' +
                  '<td style="font-size:12px' + (caOverdue_ap ? ';color:var(--rose,#f43f5e);font-weight:600' : '') + ';white-space:nowrap">' +
                    formatDate(fi.due_date_corrective_action || '') +
                    (caOverdue_ap ? '<br><span style="font-size:10px">Overdue</span>' : '') +
                  '</td>' +
                  '<td><i data-lucide="chevron-right" style="width:14px;height:14px;color:var(--text-muted)"></i></td>' +
                '</tr>';
              }
            }).join('') +
          '</tbody>' +
        '</table></div>' +
      '</div>';
    }

    // (overdueImplNote_ui dihapus — status overdue sudah ditampilkan per kolom di tabel)

    listHtml =
      _taskSection('Verifikasi Temuan', '', 'var(--amber,#f59e0b)', verifikasiTasks) +
      _taskSection('Rencana Tindakan Perbaikan dan Pencegahan (TPP)', '', 'var(--blue,#3b82f6)', isiTppTasks) +
      _taskSection('Bukti Implementasi', '', 'var(--purple,#8b5cf6)', uploadImplTasks) +
      _taskSection(
        'Approval Tindak Lanjut Temuan', '', 'var(--emerald,#10b981)', approvalImplTasks,
        (approvalImplTasks.length > 1 && App.profile.isKoordinator
          ? '<button class="btn btn-outline btn-sm" onclick="_massApproveAll(\'IMPL\')">' +
              '<i data-lucide="check-circle" style="width:13px;height:13px"></i> ' +
              'Approve Semua (' + approvalImplTasks.length + ')' +
            '</button>'
          : '')
      );
  }

  container.innerHTML =
    '<div class="page-hero mb-24">' +
      '<h1 style="display:flex;align-items:center;gap:10px">' +
        '<i data-lucide="list-checks" style="width:24px;height:24px"></i> My Task' +
      '</h1>' +
      '<p>Periode: <strong style="color:#fff">' + escHtml(period.nama_periode) + '</strong>' +
        (totalTasks > 0
          ? ' · <strong style="color:#fff">' + totalTasks + '</strong> tugas perlu ditindaklanjuti'
          : ' · Tidak ada tugas') +
      '</p>' +
    '</div>' +
    _renderTppPlanDueDateBanner(period) +
    listHtml;

  // Simpan tasks ke window untuk dipakai saat klik
  window._myTaskList = tasks;
  window._myTaskPeriod = period;

  // Prefetch detail task di background — agar klik langsung render tanpa loading
  setTimeout(function() { _prefetchTaskDetails(tasks, period); }, 400);

  lucide.createIcons();
}

// ── Task Detail (sub-page) ────────────────────────────────────

function _openTaskDetail(idx) {
  var task   = window._myTaskList[idx];
  var period = window._myTaskPeriod;
  if (!task) return;

  var container = document.getElementById('page-content');
  window._myTaskReturnIdx = idx;

  switch (task.type) {
    case 'VERIFIKASI':    _renderVerifikasiPage(container, task, period); break;
    case 'ISI_TPP':       _renderIsiTppPage(container, task, period);     break;
    case 'UPLOAD_IMPL':   _renderUploadImplPage(container, task, period); break;
    case 'APPROVAL_TPP':
    case 'APPROVAL_IMPL': _renderApprovalPage(container, task, period);   break;
  }
}

function _backToMyTask() {
  navigateTo('mytask');
}

// Prefetch GET_TPP_ITEMS + GET_APPROVAL_LOG untuk semua task yang butuh detail.
// Dibatasi max 6 task pertama agar tidak membanjiri koneksi GAS.
// Hasilnya masuk App.cache sehingga saat klik, cachedApi langsung return tanpa network.
function _prefetchTaskDetails(tasks, period) {
  var prefetchable = tasks.filter(function(t) {
    return t.result_id && (
      t.type === 'ISI_TPP' ||
      t.type === 'UPLOAD_IMPL' ||
      t.type === 'APPROVAL_IMPL' ||
      t.type === 'APPROVAL_TPP'
    );
  }).slice(0, 6); // batasi 6 teratas

  prefetchable.forEach(function(t, i) {
    // Beri jeda antar task agar tidak semua hit server sekaligus
    setTimeout(function() {
      cachedApi('GET_TPP_ITEMS', {
        period_id: period.period_id,
        result_id: t.result_id,
        agenda_id: t.agenda_id,
      }, 30).catch(function() {});
      cachedApi('GET_APPROVAL_LOG', {
        period_id: period.period_id,
        result_id: t.result_id,
      }, 30).catch(function() {});
    }, i * 500); // 500ms antar task — 6 task selesai dalam ~3 detik
  });
}

function _subPageHeader(title, subtitle) {

    '<div>' +
      '<div style="font-size:15px;font-weight:700">' + title + '</div>' +
      '<div style="font-size:12px;color:var(--text-muted)">' + subtitle + '</div>' +

}

// ════════════════════════════════════════════════════════════
//  VERIF DRAFT — browser-side draft state untuk verifikasi
//  Mirip _auditDraft tapi lebih sederhana: no lock, no groupKey
//  Key: result_id
//  Value: { result_id, deskripsi_temuan, lokasi_temuan,
//            foto_urls, status,
//            _deletedFotoUrls: [], _newFiles: [] }
// ════════════════════════════════════════════════════════════

function _verifDraftInit() {
  window._verifDraft = {};          // result_id → draft object
  window._verifPendingFiles = {};   // result_id → File[]
}

function _verifDraftSet(resultId, fields) {
  if (!window._verifDraft) window._verifDraft = {};
  var merged = Object.assign({}, window._verifDraft[resultId] || {}, fields);
  // Pastikan _deletedFotoUrls selalu array
  if (!Array.isArray(merged._deletedFotoUrls)) merged._deletedFotoUrls = [];
  window._verifDraft[resultId] = merged;
}

function _verifDraftGet(resultId) {
  return window._verifDraft && window._verifDraft[resultId] || null;
}

function _verifDraftClear(resultId) {
  if (window._verifDraft)      delete window._verifDraft[resultId];
  if (window._verifPendingFiles) delete window._verifPendingFiles[resultId];
}

function _verifHasDraft(resultId) {
  return !!(window._verifDraft && window._verifDraft[resultId]);
}

// Repaint satu verif-card berdasarkan draft state
function _verifRepaintCard(cardIdx, resultId) {
  var card = document.getElementById('verif-card-' + cardIdx);
  if (!card) return;
  var draft = _verifDraftGet(resultId);

  // Ambil nilai yang akan ditampilkan (draft > original dari data-* attr)
  var desc    = draft ? draft.deskripsi_temuan : (card.dataset.origDesc   || '');
  var lokasi  = draft ? draft.lokasi_temuan    : (card.dataset.origLokasi || '');
  var status  = draft ? draft.status           : (card.dataset.origStatus || 'Non Comply');
  var isDraft = !!draft;
  var isComply = status === 'Comply';

  // Warna background card
  card.style.background    = isDraft ? 'rgba(245,158,11,.08)' : '';
  card.style.borderColor   = isDraft ? 'var(--amber,#f59e0b)' : '';
  card.style.borderWidth   = isDraft ? '1.5px' : '';

  // Update badge status di header
  var badgeEl = card.querySelector('.verif-status-badge');
  if (badgeEl) {
    badgeEl.className   = 'badge verif-status-badge ' + (isComply ? 'badge-emerald' : 'badge-rose');
    badgeEl.innerHTML   = (isComply
      ? '<i data-lucide="check" style="width:11px;height:11px"></i> Comply'
      : '<i data-lucide="x" style="width:11px;height:11px"></i> Non Comply');
    lucide.createIcons(badgeEl);
  }

  // Draft dot
  var draftDot = card.querySelector('.verif-draft-dot');
  if (draftDot) draftDot.style.display = isDraft ? 'inline-block' : 'none';

  // Deskripsi display
  var descEl = card.querySelector('.verif-desc-display');
  if (descEl) descEl.textContent = isComply ? '(Akan diubah ke Comply — temuan ditutup)' : (desc || '—');
  if (descEl) descEl.style.color = isComply ? 'var(--emerald,#10b981)' : isDraft ? 'var(--amber,#f59e0b)' : '';
  if (descEl) descEl.style.fontStyle = isComply ? 'italic' : '';

  // Lokasi display
  var lokasiEl = card.querySelector('.verif-lokasi-display');
  if (lokasiEl) {
    lokasiEl.textContent = lokasi || '—';
    lokasiEl.style.color = isDraft ? 'var(--amber,#f59e0b)' : '';
  }

  // Foto display — rebuild
  var fotoEl = card.querySelector('.verif-foto-display');
  if (fotoEl) {
    var fotoUrls    = draft ? (typeof draft.foto_urls === 'string' ? draft.foto_urls : '') : (card.dataset.origFotoUrls || '');
    var deletedUrls = draft ? (Array.isArray(draft._deletedFotoUrls) ? draft._deletedFotoUrls : []) : [];
    var activeUrls  = fotoUrls.split(',').filter(function(u) {
      return u && deletedUrls.indexOf(u) === -1;
    });
    var pendingCount = (window._verifPendingFiles && window._verifPendingFiles[resultId])
      ? window._verifPendingFiles[resultId].length : 0;

    fotoEl.innerHTML = activeUrls.map(function(url) {
      return '<a href="' + escHtml(url) + '" target="_blank" class="btn btn-outline btn-sm">' +
        '<i data-lucide="image" style="width:12px;height:12px"></i> Lihat Foto' +
      '</a>';
    }).join('') +
    (pendingCount > 0
      ? '<span style="font-size:11px;color:var(--amber,#f59e0b);font-weight:600;margin-left:4px">' +
          '<i data-lucide="clock" style="width:11px;height:11px;vertical-align:middle"></i> ' +
          pendingCount + ' foto baru (belum disimpan)' +
        '</span>'
      : '');
    lucide.createIcons(fotoEl);
  }
}

async function _renderVerifikasiPage(container, task, period) {
  container.innerHTML =
    '<div class="page-loader"><div class="spinner dark"></div><span>Memuat temuan...</span></div>';

  // Init draft state baru setiap kali halaman di-render
  _verifDraftInit();
  // Simpan context untuk dipakai modal
  window._verifCtx = { task: task, period: period };

  try {
    var findings = await api('GET_FINDINGS_BY_AGENDA', {
      period_id: period.period_id,
      agenda_id: task.agenda_id,
    });
    // Simpan findings ke window untuk repaint
    window._verifFindings = findings.filter(function(f) {
      return f.finding_status === 'PENDING_VERIFICATION';
    });
    var pendingFindings = window._verifFindings;

    var cardsHtml = pendingFindings.map(function(f, i) {
      return _verifRenderCard(f, i);
    }).join('');

    container.innerHTML =
      _subPageHeader(
        'Verifikasi Temuan — ' + escHtml(task.agenda ? task.agenda.dept : ''),
        pendingFindings.length + ' temuan menunggu verifikasi'
      ) +
      (pendingFindings.length === 0
        ? '<div class="card"><div class="card-body empty-state"><div class="empty-desc">Tidak ada temuan yang perlu diverifikasi.</div></div></div>'
        : cardsHtml +
          '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">' +
            '<button class="btn btn-outline" onclick="_backToMyTask()">Batal</button>' +
            '<button class="btn btn-primary" id="verif-submit-btn" ' +
              'onclick="singleClick(this,function(){ _verifClickVerifikasi() })">' +
              '<i data-lucide="shield-check" style="width:14px;height:14px"></i> Verifikasi Semua' +
            '</button>' +
          '</div>'
      );
    lucide.createIcons();
    setTimeout(function() { _loadAllDriveImgs(container); }, 200);
  } catch(err) {
    container.innerHTML = _subPageHeader('Verifikasi Temuan', '') +
      '<div class="empty-state"><div class="empty-desc">' + escHtml(err.message) + '</div></div>';
    lucide.createIcons();
  }
}

// ── Render satu card temuan (dipanggil saat init + setelah edit) ──────────────

  var isComply = isDraft ? draft.status === 'Comply' : false;

  var dispDesc   = isDraft ? (draft.deskripsi_temuan || '') : (f.deskripsi_temuan || '—');
  var dispLokasi = isDraft ? (draft.lokasi_temuan    || '') : (f.lokasi_temuan    || '');

  var deletedUrls  = isDraft ? (Array.isArray(draft._deletedFotoUrls) ? draft._deletedFotoUrls : []) : [];
  var baseFotoUrls = isDraft ? (typeof draft.foto_urls === 'string' ? draft.foto_urls : (f.foto_urls || '')) : (f.foto_urls || '');
  var activeFotoUrls = baseFotoUrls.split(',').filter(function(u) {
    return u && deletedUrls.indexOf(u) === -1;
  });
  var pendingCount = (window._verifPendingFiles && window._verifPendingFiles[f.result_id])
    ? window._verifPendingFiles[f.result_id].length : 0;

    'data-orig-lokasi="' + escAttr(f.lokasi_temuan || '') + '" ' +
    'data-orig-status="' + escAttr(f.status || 'Non Comply') + '" ' +
    'data-orig-foto-urls="' + escAttr(f.foto_urls || '') + '" ' +

        '<span style="display:inline-flex;align-items:center;justify-content:center;' +
          'width:26px;height:26px;border-radius:50%;background:var(--rose,#f43f5e)18;' +
          'color:var(--rose,#f43f5e);font-size:12px;font-weight:700;flex-shrink:0">' + (i + 1) + '</span>' +

          'style="display:inline-flex;align-items:center;gap:4px">' +

            : '<i data-lucide="x" style="width:11px;height:11px"></i> Non Comply') +

        '<span class="td-mono" style="font-size:11px;color:var(--text-muted)">' +

        '</span>' +
        // Draft dot
        '<span class="verif-draft-dot" style="display:' + (isDraft ? 'inline-block' : 'none') + ';' +
          'width:7px;height:7px;border-radius:50%;background:var(--amber,#f59e0b);flex-shrink:0"></span>' +
        '<span style="flex:1"></span>' +
        // Tombol pensil
        '<button title="Edit temuan" ' +

        '</summary>' +

      '</div>' +

      // ── Lokasi ─────────────────────────────────────────────
      '<div style="margin-bottom:10px">' +
        '<div style="font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--text-muted);margin-bottom:4px">LOKASI TEMUAN</div>' +
        '<div class="verif-lokasi-display" style="font-size:13px;padding:7px 12px;' +
          'background:var(--bg);border:1px solid var(--border);border-radius:6px;' +
          (isDraft && !isComply ? 'color:var(--amber,#f59e0b);' : '') + '">' +
          escHtml(isComply ? '—' : (dispLokasi || '—')) +
        '</div>' +
      '</div>' +

      // ── Foto Bukti ─────────────────────────────────────────

        '<div style="font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--text-muted);margin-bottom:6px">FOTO BUKTI</div>' +
        '<div class="verif-foto-display" style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">' +
          activeFotoUrls.map(function(url) {
            return '<a href="' + escHtml(url) + '" target="_blank" class="btn btn-outline btn-sm" data-drive-url="' + escAttr(url) + '">' +
              '<i data-lucide="image" style="width:12px;height:12px"></i> Lihat Foto</a>';
          }).join('') +
          (pendingCount > 0
            ? '<span style="font-size:11px;color:var(--amber,#f59e0b);font-weight:600">' +
                '<i data-lucide="clock" style="width:11px;height:11px;vertical-align:middle"></i> ' +
                pendingCount + ' foto baru' +
              '</span>'
            : '') +
          (activeFotoUrls.length === 0 && pendingCount === 0 ? '<span style="font-size:12px;color:var(--text-muted)">—</span>' : '') +

function _buildStatusOptions(current) {
  var options = ['Non Comply', 'Comply'];
  return options.map(function(s) {
    return '<option value="' + s + '" ' + (s === current ? 'selected' : '') + '>' + s + '</option>';
  }).join('');
}

function _verifDetectChange(idx) {
  var descEl        = document.getElementById('verif-desc-'          + idx);
  var statusEl      = document.getElementById('verif-status-'        + idx);
  var descBadgeEl   = document.getElementById('verif-desc-badge-'    + idx);
  var statusBadgeEl = document.getElementById('verif-status-badge-'  + idx);
  if (descEl   && descBadgeEl)   descBadgeEl.style.display   = (descEl.value.trim()   !== (descEl.dataset.orig   || '')) ? 'inline-flex' : 'none';
  if (statusEl && statusBadgeEl) statusBadgeEl.style.display = (statusEl.value !== (statusEl.dataset.orig || '')) ? 'inline-flex' : 'none';
}

async function _verifOpenEditModal(resultId, cardIdx) {
  var ctx   = window._verifCtx;
  var f     = window._verifFindings && window._verifFindings[cardIdx];
  if (!f || !ctx) return;

  // Ambil nilai saat ini: draft lebih prioritas dari server
  var draft = _verifDraftGet(resultId);
  var initDesc   = draft ? (draft.deskripsi_temuan || '') : (f.deskripsi_temuan || '');
  var initLokasi = draft ? (draft.lokasi_temuan    || '') : (f.lokasi_temuan    || '');
  var initStatus = draft ? draft.status : (f.status || 'Non Comply');
  var initFotoUrls = draft ? (draft.foto_urls || f.foto_urls || '') : (f.foto_urls || '');
  var initDeleted  = draft ? (Array.isArray(draft._deletedFotoUrls) ? draft._deletedFotoUrls : []) : [];
  var pendingFiles = (window._verifPendingFiles && window._verifPendingFiles[resultId]) || [];

  // Build foto saved html — reuse _buildSavedFotosHtml dengan prefix 'vf'
  // tapi tanpa delete ke server, hanya mark deleted
  var activeFotoUrls = initFotoUrls.split(',').filter(function(u) {
    return u && initDeleted.indexOf(u) === -1;
  });
  window._vfExistingUrls = activeFotoUrls.slice();
  window._vfDeletedUrls  = initDeleted.slice();

  var savedFotoHtml = activeFotoUrls.length
    ? '<div style="margin-bottom:8px">' +
        '<div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:6px">Foto tersimpan:</div>' +
        '<div id="vf-saved-files" style="display:flex;flex-wrap:wrap;gap:8px">' +
          activeFotoUrls.map(function(url, idx) {
            return '<div style="position:relative;width:72px;height:72px;border-radius:6px;' +
              'overflow:hidden;border:1px solid var(--border);cursor:zoom-in" ' +
              'onclick="_openFotoLightbox(\'' + escAttr(url) + '\')">' +
              _renderDriveImg(url) +
              '<button title="Hapus foto" ' +
                'onclick="event.stopPropagation();singleClick(this,function(){ _verifMarkDeleteFoto(\'' + escAttr(url) + '\',' + idx + ') })" ' +
                'style="position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;' +
                  'background:rgba(0,0,0,.55);border:none;color:#fff;cursor:pointer;' +
                  'display:flex;align-items:center;justify-content:center;font-size:10px;padding:0">✕</button>' +
            '</div>';
          }).join('') +
        '</div>' +
      '</div>'
    : '';

  createModal({
    id:    'verif-edit-modal',
    title: 'Edit Temuan — ' + escHtml(f.result_id),
    size:  'modal-lg',
    body:
      // Konten temuan
      '<div id="vem-noncomplysection">' +
        '<div class="form-group">' +
          '<label class="form-label">Deskripsi Temuan <span class="required">*</span></label>' +
          '<textarea class="form-control" id="vem-deskripsi" rows="4" ' +
            'placeholder="Jelaskan kondisi yang ditemukan...">' +
            escHtml(initDesc) +
          '</textarea>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Lokasi Temuan <span class="required">*</span></label>' +
          '<input type="text" class="form-control" id="vem-lokasi" ' +
            'placeholder="e.g. Gudang B, Lantai 2, Area penyimpanan kimia" ' +
            'value="' + escHtml(initLokasi) + '">' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Foto Bukti <span class="required">*</span>' +
            '<span id="vem-foto-hint" style="font-size:11px;color:var(--rose,#f43f5e);font-weight:400;margin-left:6px">' +
              (activeFotoUrls.length + pendingFiles.length > 0 ? '' : '(wajib minimal 1 foto)') +
            '</span>' +
          '</label>' +
          savedFotoHtml +
          (pendingFiles.length > 0
            ? '<div style="font-size:11px;color:var(--amber,#f59e0b);font-weight:600;margin-bottom:6px">' +
                '<i data-lucide="clock" style="width:11px;height:11px;vertical-align:middle"></i> ' +
                pendingFiles.length + ' foto baru (belum disimpan)' +
              '</div>'
            : '') +
          '<div class="upload-zone" id="vem-upload-zone" style="min-height:72px">' +
            '<i data-lucide="camera" style="width:22px;height:22px;opacity:.3;margin-bottom:4px"></i>' +
            '<div class="upload-text" style="font-size:12px">Klik atau drag foto bukti baru</div>' +
          '</div>' +
          '<div class="upload-previews" id="vem-upload-preview"></div>' +
        '</div>' +
      '</div>',

    footer:
      '<button class="btn btn-outline" style="margin-right:auto" ' +
        'onclick="singleClick(this,function(){ _verifSwitchToComply(' + cardIdx + ') })">' +
        '<i data-lucide="check" style="width:13px;height:13px"></i> Ubah ke Comply' +
      '</button>' +
      '<button class="btn btn-outline" onclick="closeModal(\'verif-edit-modal\')">Batal</button>' +
      '<button class="btn btn-danger" onclick="singleClick(this,function(){ _verifSaveEditModal(' + cardIdx + ') })">' +
        '<i data-lucide="save" style="width:13px;height:13px"></i> Simpan Temuan' +
      '</button>',
  });

  setTimeout(function() { _loadAllDriveImgs(document.getElementById('verif-edit-modal') || document); }, 300);
  lucide.createIcons();

  // Setup upload zone — reuse setupUploadZone dari form audit
  setupUploadZone('vem-upload-zone', 'vem-upload-preview', function(files) {

function _verifSaveEditModal(cardIdx, forceComply) {
  var f = window._verifFindings && window._verifFindings[cardIdx];
  if (!f) return;

  var descEl   = document.getElementById('vem-deskripsi');
  var lokasiEl = document.getElementById('vem-lokasi');
  var zone     = document.getElementById('vem-upload-zone');
  var newStatus = forceComply ? 'Comply' : 'Non Comply';

  if (newStatus === 'Non Comply') {
    var desc   = descEl   ? descEl.value.trim()   : '';
    var lokasi = lokasiEl ? lokasiEl.value.trim()  : '';
    if (!desc)   return toast('Deskripsi temuan wajib diisi.', 'error');
    if (!lokasi) return toast('Lokasi temuan wajib diisi.', 'error');

    var allZoneFiles = zone && zone._getFiles ? zone._getFiles() : [];
    var savedCount   = (window._vfExistingUrls || []).length - (window._vfDeletedUrls || []).length;
    var existPending = (window._verifPendingFiles && window._verifPendingFiles[f.result_id]) || [];

    // Ambil hanya file BARU: zone berisi [existingPending... + newFiles...]
    // _existingPendingCount adalah marker jumlah file lama yang di-restore saat modal dibuka
    var existingCount = (zone && zone._existingPendingCount != null)
      ? zone._existingPendingCount
      : existPending.length;
    var trulyNewFiles = allZoneFiles.slice(existingCount);

    if (trulyNewFiles.length + savedCount + existPending.length < 1) {
      return toast('Upload minimal 1 foto bukti temuan.', 'error');
    }

    // Gabungkan: existing pending + file benar-benar baru
    var allPending = existPending.concat(trulyNewFiles);
    if (!window._verifPendingFiles) window._verifPendingFiles = {};
    window._verifPendingFiles[f.result_id] = allPending;

    // Hitung foto_urls yang masih aktif (existing minus deleted)
    var baseUrls    = (f.foto_urls || '').split(',').filter(Boolean);
    var deleted     = window._vfDeletedUrls || [];
    var activeUrls  = baseUrls.filter(function(u) { return deleted.indexOf(u) === -1; });

    _verifDraftSet(f.result_id, {
      status:            'Non Comply',
      deskripsi_temuan:  desc,
      lokasi_temuan:     lokasi,
      foto_urls:         activeUrls.join(','),
      _deletedFotoUrls:  deleted.slice(),
    });
  } else {
    // Comply — clear semua finding data di draft
    _verifDraftSet(f.result_id, {
      status:           'Comply',
      deskripsi_temuan: '',
      lokasi_temuan:    '',
      foto_urls:        '',
      _deletedFotoUrls: [],
    });
    if (window._verifPendingFiles) delete window._verifPendingFiles[f.result_id];
  }

  closeModal('verif-edit-modal');

  // Repaint card dengan data draft baru
  var card = document.getElementById('verif-card-' + cardIdx);
  if (card) {
    card.outerHTML = _verifRenderCard(f, cardIdx);
    lucide.createIcons(document.getElementById('verif-card-' + cardIdx));
    setTimeout(function() {
      _loadAllDriveImgs(document.getElementById('verif-card-' + cardIdx));
    }, 100);
  }
}

async function _verifConfirmSubmit() {
  var ctx      = window._verifCtx;
  var findings = window._verifFindings || [];
  var agendaId = ctx.task.agenda_id;
  var periodId = ctx.period.period_id;

  // DEBUG — dump semua draft state
  console.log('[VERIF_CONFIRM] findings count:', findings.length);
  findings.forEach(function(f) {
    var d = _verifDraftGet(f.result_id);
    console.log('[DRAFT]', f.result_id, {
      hasDraft:         !!d,
      status:           d && d.status,
      foto_urls:        d && d.foto_urls,
      foto_urls_type:   d && typeof d.foto_urls,
      _deletedFotoUrls: d && d._deletedFotoUrls,
      _deleted_type:    d && typeof d._deletedFotoUrls,
      _deleted_isArray: d && Array.isArray(d._deletedFotoUrls),
    });
  });

  var btn = document.getElementById('verif-confirm-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner" style="width:13px;height:13px;border-width:2px"></div> Menyimpan...'; }

  try {
    // Bangun updates — semua findings (draft + non-draft)
    var updates = await Promise.all(findings.map(async function(f) {
      var draft = _verifDraftGet(f.result_id);
      if (!draft) {
        // Tidak diubah — kirim data asli
        return {
          result_id:    f.result_id,
          final_status: f.status || 'Non Comply',
        };
      }
      if (draft.status === 'Comply') {
        // Hapus foto yang di-mark deleted dari Drive (non-fatal)
        if (draft._deletedFotoUrls && draft._deletedFotoUrls.length) {
          for (var _di = 0; _di < draft._deletedFotoUrls.length; _di++) {
            try { await api('DELETE_DRIVE_FILE', { file_url: draft._deletedFotoUrls[_di] }); } catch(e) {}
          }
        }
        return {
          result_id:    f.result_id,
          final_status: 'Comply',
        };
      }
      // Non Comply dengan perubahan — encode foto baru
      var newFiles = (window._verifPendingFiles && window._verifPendingFiles[f.result_id]) || [];
      console.log('[ENCODE] result_id:', f.result_id, 'newFiles type:', typeof newFiles, 'isArray:', Array.isArray(newFiles), 'length:', newFiles && newFiles.length);
      console.log('[ENCODE] newFiles[0]:', newFiles && newFiles[0] ? { name: newFiles[0].name, type: newFiles[0].type, size: newFiles[0].size } : 'empty');
      var encodedFiles = newFiles.length ? await filesToBase64(newFiles) : [];
      console.log('[ENCODE_DONE] encodedFiles count:', encodedFiles.length);

      // Hapus foto yang di-mark deleted dari Drive (non-fatal)
      var deletedNc = Array.isArray(draft._deletedFotoUrls) ? draft._deletedFotoUrls : [];
      for (var _dj = 0; _dj < deletedNc.length; _dj++) {
        try { await api('DELETE_DRIVE_FILE', { file_url: deletedNc[_dj] }); } catch(e) {}
      }

      return {
        result_id:          f.result_id,
        final_status:       'Non Comply',
        deskripsi_temuan:   draft.deskripsi_temuan  || '',
        lokasi_temuan:      draft.lokasi_temuan      || '',
        existing_foto_urls: typeof draft.foto_urls === 'string' ? draft.foto_urls : '',
        new_files:          encodedFiles,
      };
    }));

    await api('VERIFY_FINDINGS', {
      period_id: periodId,
      agenda_id: agendaId,
      updates:   updates,
    });

    clearCache('GET_ALL_FINDINGS_BY_PERIOD');
    clearCache('GET_DASHBOARD');
    clearCache('GET_HASIL_AUDIT');
    clearCache('GET_FINDINGS_BY_AGENDA');
    closeModal('verif-preview-modal');
    toast('Verifikasi berhasil. Temuan bisa ditindaklanjuti auditee.', 'success');
    navigateTo('mytask');
  } catch(err) {
    toast(err.message, 'error');
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="shield-check" style="width:13px;height:13px"></i> Konfirmasi & Simpan';
      lucide.createIcons(btn);
    }
  }
}

async function _submitTpp(resultId, agendaId, periodId) {
  var elCorrection = document.getElementById('tpp-correction');
  var elDueCorr    = document.getElementById('tpp-due-date-correction');
  var elCA         = document.getElementById('tpp-corrective-action');
  var elDueCA      = document.getElementById('tpp-due-date-corrective-action');

  var correction       = (elCorrection || {}).value?.trim();
  var dueDateCorr      = (elDueCorr || {}).value;
  var correctiveAction = (elCA || {}).value?.trim();
  var dueDateCA        = (elDueCA || {}).value;

  if (!correction)       return toast('Correction wajib diisi.', 'error');
  if (!dueDateCorr)      return toast('Due date correction wajib diisi.', 'error');
  if (!correctiveAction) return toast('Corrective Action wajib diisi.', 'error');
  if (!dueDateCA)        return toast('Due date corrective action wajib diisi.', 'error');

  // Validasi tanggal tidak boleh di masa lalu
  var today = new Date(); today.setHours(0,0,0,0);
  if (new Date(dueDateCorr) < today) return toast('Due date correction tidak boleh di masa lalu.', 'error');
  if (new Date(dueDateCA)   < today) return toast('Due date corrective action tidak boleh di masa lalu.', 'error');

  // Validasi urutan logis
  if (new Date(dueDateCorr) > new Date(dueDateCA))
    return toast('Due date correction harus lebih awal atau sama dengan due date corrective action.', 'error');

  // Validasi max date
  var _pd = App.activePeriod || {};
  var _endDate = _pd.tanggal_selesai ? new Date(_pd.tanggal_selesai) : null;
  if (_endDate) {
    var _maxCorr = new Date(_endDate); _maxCorr.setMonth(_maxCorr.getMonth() + 3);
    var _maxCA   = new Date(_endDate); _maxCA.setFullYear(_maxCA.getFullYear() + 1);
    if (new Date(dueDateCorr) > _maxCorr)
      return toast('Due date correction melebihi batas maksimal (' + formatDate(_maxCorr.toISOString().split('T')[0]) + ').', 'error');
    if (new Date(dueDateCA) > _maxCA)
      return toast('Due date corrective action melebihi batas maksimal (' + formatDate(_maxCA.toISOString().split('T')[0]) + ').', 'error');
  }

  var btn      = document.getElementById('tpp-submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:13px;height:13px;border-width:2px"></div> Mengirim...';

  // Disable semua field form supaya tidak bisa diubah / submit dobel selama proses
  [elCorrection, elDueCorr, elCA, elDueCA].forEach(function(el) {
    if (el) el.disabled = true;
  });
  var cancelBtn = document.querySelector('.btn.btn-outline[onclick="_backToMyTask()"]');
  if (cancelBtn) cancelBtn.disabled = true;

  try {
    await api('SUBMIT_TPP', {
      period_id:                  periodId,
      result_id:                  resultId,
      agenda_id:                  agendaId,
      correction:                 correction,
      due_date_correction:        dueDateCorr,
      corrective_action:          correctiveAction,
      due_date_corrective_action: dueDateCA,
    });
    clearCache('GET_ALL_FINDINGS_BY_PERIOD');
    clearCache('GET_DASHBOARD');
    clearCache('GET_HASIL_AUDIT');
    clearCache('GET_APPROVAL_LOG');
    clearCache('GET_MY_OPEN_TPP_COUNT');
    _preloadOpenTppFlag(App.activePeriod);
    toast('TPP berhasil disubmit. Silakan upload bukti implementasi.', 'success');
    navigateTo('mytask');
  } catch(err) {
    toast(err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '<i data-lucide="send" style="width:14px;height:14px"></i> Submit TPP';
    [elCorrection, elDueCorr, elCA, elDueCA].forEach(function(el) {
      if (el) el.disabled = false;
    });
    if (cancelBtn) cancelBtn.disabled = false;
    lucide.createIcons();
  }
}

async function _saveImplTppEdit(periodEndDate, resultId, agendaId, periodId) {
  var res = window._implCurrentRes || {};
  var correction       = (document.getElementById('impl-edit-correction') || {}).value?.trim();
  var dueDateCorr      = (document.getElementById('impl-edit-due-corr') || {}).value;
  var correctiveAction = (document.getElementById('impl-edit-ca') || {}).value?.trim();
  var dueDateCA        = (document.getElementById('impl-edit-due-ca') || {}).value;

  if (!correction)       return toast('Correction wajib diisi.', 'error');
  if (!dueDateCorr)      return toast('Due date correction wajib diisi.', 'error');
  if (!correctiveAction) return toast('Corrective Action wajib diisi.', 'error');
  if (!dueDateCA)        return toast('Due date corrective action wajib diisi.', 'error');

  // Validasi batas maksimal due date
  if (periodEndDate) {
    var endDate = new Date(periodEndDate);
    var maxCorr = new Date(endDate); maxCorr.setMonth(maxCorr.getMonth() + 3);
    var maxCA   = new Date(endDate); maxCA.setFullYear(maxCA.getFullYear() + 1);
    if (new Date(dueDateCorr) > maxCorr)
      return toast('Due date correction melebihi batas maksimal (' + formatDate(maxCorr.toISOString().split('T')[0]) + ').', 'error');
    if (new Date(dueDateCA) > maxCA)
      return toast('Due date corrective action melebihi batas maksimal (' + formatDate(maxCA.toISOString().split('T')[0]) + ').', 'error');
  }

  // Validasi tanggal tidak boleh di masa lalu
  var today = new Date(); today.setHours(0,0,0,0);
  if (new Date(dueDateCorr) < today) return toast('Due date correction tidak boleh di masa lalu.', 'error');
  if (new Date(dueDateCA)   < today) return toast('Due date corrective action tidak boleh di masa lalu.', 'error');

  // Validasi urutan logis
  if (new Date(dueDateCorr) > new Date(dueDateCA))
    return toast('Due date correction harus lebih awal atau sama dengan due date corrective action.', 'error');

  var ok = await showConfirm({
    title:       'Simpan Perubahan Rencana TPP?',
    message:     'Perubahan correction, corrective action, dan due date akan disimpan.',
    confirmText: 'Ya, Simpan',
  });
  if (!ok) return;

  var btn = document.getElementById('impl-tpp-save-btn');
  var _tppEditFields = ['impl-edit-correction', 'impl-edit-due-corr', 'impl-edit-ca', 'impl-edit-due-ca'];
  if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner" style="width:12px;height:12px;border-width:2px"></div> Menyimpan...'; }
  _tppEditFields.forEach(function(id) { var el = document.getElementById(id); if (el) el.disabled = true; });

  function _restoreTppForm() {
    if (btn) { btn.disabled = false; btn.innerHTML = 'Simpan'; }
    _tppEditFields.forEach(function(id) { var el = document.getElementById(id); if (el) el.disabled = false; });
  }

  try {
    await api('UPDATE_TPP_PLAN', {
      period_id:                  periodId,
      result_id:                  resultId,
      agenda_id:                  agendaId,
      correction:                 correction,
      due_date_correction:        dueDateCorr,
      corrective_action:          correctiveAction,
      due_date_corrective_action: dueDateCA,
    });
    clearCache('GET_ALL_FINDINGS_BY_PERIOD');
    clearCache('GET_DASHBOARD');
    clearCache('GET_HASIL_AUDIT');
    clearCache('GET_TPP_ITEMS');
    toast('Rencana TPP berhasil diperbarui.', 'success');
    // Re-render halaman
    var task = window._myTaskList && window._myTaskList[window._myTaskReturnIdx];
    if (task) _renderUploadImplPage(document.getElementById('page-content'), task, window._myTaskPeriod);
  } catch(err) {
    toast(err.message, 'error');
    _restoreTppForm();
  }
}

// Parse entry foto_urls: bisa "url" (lama) atau "url::namafile" (baru)
function _parseFotoEntry(entry) {
  var idx = entry.indexOf('::');
  if (idx === -1) return { url: entry, name: '' };
  return { url: entry.substring(0, idx), name: entry.substring(idx + 2) };
}

function _fotoLabel(entry, i) {
  var parsed = _parseFotoEntry(entry);
  return parsed.name ? parsed.name : ('Bukti ' + (i + 1));
}

function _fotoUrl(entry) {
  return _parseFotoEntry(entry).url;
}

  var wrapper = btnEl ? btnEl.parentElement : null;

// State foto existing yang sudah dihapus (belum di-submit ulang) — per result_id, per jenis
var _implDeletedFotos = { correction: {}, ca: {} };

async function _deleteImplFoto(url, jenis, resultId, agendaId, periodId, btnEl) {
  var ok = await showConfirm({
    title: 'Hapus Foto', message: 'Hapus foto bukti ini?',
    detail: 'File akan dihapus dari sistem.', confirmText: 'Hapus', danger: true,
  });
  if (!ok) return;

  // Lock seluruh card Correction/CA terkait selama proses hapus berlangsung
  var card = btnEl ? btnEl.closest('.card') : null;
  var allButtonsInCard = card ? Array.from(card.querySelectorAll('button, .upload-remove')) : [];
  allButtonsInCard.forEach(function(b) { b.disabled = true; b.style.pointerEvents = 'none'; b.style.opacity = '0.5'; });
  if (btnEl) {
    btnEl.style.opacity = '1';
    btnEl.innerHTML = '<div class="spinner" style="width:10px;height:10px;border-width:2px;margin:auto"></div>';
  }

  function _restoreButtons() {
    allButtonsInCard.forEach(function(b) { b.disabled = false; b.style.pointerEvents = ''; b.style.opacity = ''; });
  }

  // 1. Hapus dari Drive
  try { await api('DELETE_DRIVE_FILE', { file_url: url }); }
  catch(e) { toast('Gagal hapus file: ' + e.message, 'error'); _restoreButtons(); if (btnEl) btnEl.innerHTML = '✕'; return; }

  // 2. Update foto_urls di sheet — TANPA trigger approval/notifikasi
  var field = jenis === 'correction'
    ? 'impl_correction_foto_urls'
    : 'impl_corrective_action_foto_urls';
  try {
    var tppData = await api('GET_TPP_ITEMS', { period_id: periodId, result_id: resultId, agenda_id: agendaId });
    var res = (tppData && tppData[0]) ? tppData[0] : {};
    var remainingUrls = (res[field] || '').split(',').filter(Boolean)
      .filter(function(u) { return _fotoUrl(u) !== url; });
    await api('UPDATE_IMPL_FOTO_URLS', {
      period_id: periodId,
      result_id: resultId,
      field:     field,
      foto_urls: remainingUrls.join(','),
    });
  } catch(e) {
    toast('Gagal update data setelah hapus foto: ' + e.message, 'error');
    _restoreButtons();
    if (btnEl) btnEl.innerHTML = '✕';
    return;
  }

  clearCache('GET_ALL_FINDINGS_BY_PERIOD');
  clearCache('GET_DASHBOARD');
  clearCache('GET_HASIL_AUDIT');
  toast('Foto berhasil dihapus.', 'success');
  var task = window._myTaskList && window._myTaskList[window._myTaskReturnIdx];
  if (task) _renderUploadImplPage(document.getElementById('page-content'), task, window._myTaskPeriod);
}

async function _validateAndSubmitImpl(jenis, resultId, agendaId, periodId, maxDateStr) {
  var dueInputId = jenis === 'correction' ? 'impl-edit-due-corr' : 'impl-edit-due-ca';
  var txtId      = jenis === 'correction' ? 'impl-edit-correction' : 'impl-edit-ca';
  var dueEl      = document.getElementById(dueInputId);
  var txtEl      = document.getElementById(txtId);
  var dueVal     = dueEl ? dueEl.value : '';
  var txtVal     = txtEl ? txtEl.value.trim() : '';

  if (!txtVal) return toast((jenis === 'correction' ? 'Correction' : 'Corrective Action') + ' wajib diisi.', 'error');
  if (!dueVal) return toast('Due date wajib diisi.', 'error');

  var today = new Date(); today.setHours(0,0,0,0);
  var due   = new Date(dueVal);
  if (maxDateStr) {
    var max = new Date(maxDateStr);
    if (due > max) return toast('Due date melebihi batas maksimal (' + formatDate(maxDateStr) + ').', 'error');
  }

  // Cek apakah due date berubah — kalau berubah, update TPP plan dulu
  var res = window._implCurrentRes || {};
  var existingDue = jenis === 'correction' ? res.due_date_correction : res.due_date_corrective_action;
  var existingTxt = jenis === 'correction' ? res.correction          : res.corrective_action;
  var dueChanged  = toDateInputValue(existingDue) !== dueVal;
  var txtChanged  = (existingTxt || '').trim() !== txtVal;

  if (dueChanged || txtChanged) {
    try {
      var updatePayload = {
        period_id:                  periodId,
        result_id:                  resultId,
        agenda_id:                  agendaId,
        correction:                 jenis === 'correction' ? txtVal         : (res.correction || ''),
        due_date_correction:        jenis === 'correction' ? dueVal         : toDateInputValue(res.due_date_correction),
        corrective_action:          jenis === 'ca'         ? txtVal         : (res.corrective_action || ''),
        due_date_corrective_action: jenis === 'ca'         ? dueVal         : toDateInputValue(res.due_date_corrective_action),
      };
      await api('UPDATE_TPP_PLAN', updatePayload);
      clearCache('GET_TPP_ITEMS');
    } catch(err) {
      return toast('Gagal menyimpan perubahan rencana: ' + err.message, 'error');
    }
  }

  // Lanjut submit bukti
  if (jenis === 'correction') {
    _submitCorrectionImpl(resultId, agendaId, periodId);
  } else {
    _submitCorrectiveActionImpl(resultId, agendaId, periodId);
  }
}

async function _submitCorrectionImpl(resultId, agendaId, periodId) {
  var zone  = document.getElementById('impl-correction-zone');
  var files = zone && zone._getFiles ? zone._getFiles() : [];

  var savedContainer = document.getElementById('impl-correction-saved-files');
  var existingDomCount = savedContainer ? savedContainer.querySelectorAll('button').length : 0;
  if (!files.length && existingDomCount === 0) {
    return toast('Upload minimal 1 bukti correction.', 'error');
  }

  var ketEl      = document.getElementById('impl-correction-ket');
  var keterangan = (ketEl || {}).value?.trim() || '';
  if (!keterangan) return toast('Keterangan correction wajib diisi.', 'error');

  var btn = document.getElementById('impl-correction-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:12px;height:12px;border-width:2px"></div> Mengirim...';
  if (zone)  { zone.style.pointerEvents = 'none'; zone.style.opacity = '0.5'; }
  if (ketEl)   ketEl.disabled = true;

  try {
    var tppData = await api('GET_TPP_ITEMS', { period_id: periodId, result_id: resultId, agenda_id: agendaId });
    var res = (tppData && tppData[0]) ? tppData[0] : {};

    // Hapus foto pending-delete dari Drive (non-fatal)
    var pendingDels = (_implPendingDeletes && _implPendingDeletes.correction) || [];
    for (var _di = 0; _di < pendingDels.length; _di++) {
      try { await api('DELETE_DRIVE_FILE', { file_url: pendingDels[_di] }); }
      catch(e) { console.warn('[submitCorrectionImpl] delete gagal (non-fatal):', e.message); }
    }

    // Existing dari server dikurangi yang dihapus
    var existingUrls = (res.impl_correction_foto_urls || '').split(',').filter(Boolean)
      .filter(function(u) { return pendingDels.indexOf(_fotoUrl(u)) === -1; })
      .join(',');

    var b64files = await filesToBase64(files);
    await api('SUBMIT_CORRECTION_IMPL', {
      period_id:          periodId,
      result_id:          resultId,
      agenda_id:          agendaId,
      files:              b64files,
      keterangan:         keterangan,
      existing_foto_urls: existingUrls,
    });

    _implPendingDeletes.correction = [];
    clearCache('GET_ALL_FINDINGS_BY_PERIOD');
    clearCache('GET_DASHBOARD');
    clearCache('GET_HASIL_AUDIT');
    toast('Bukti correction berhasil dikirim.', 'success');
    var task = window._myTaskList && window._myTaskList[window._myTaskReturnIdx];
    if (task) _renderUploadImplPage(document.getElementById('page-content'), task, window._myTaskPeriod);
  } catch(err) {
    toast(err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '<i data-lucide="upload" style="width:12px;height:12px"></i> ' + (window._implCurrentRes && window._implCurrentRes.impl_correction_submitted_at ? 'Submit Correction Ulang' : 'Submit Correction');
    if (zone)  { zone.style.pointerEvents = ''; zone.style.opacity = ''; }
    if (ketEl)   ketEl.disabled = false;
    lucide.createIcons();
  }
}

async function _submitCorrectiveActionImpl(resultId, agendaId, periodId) {
  var zone = document.getElementById('impl-ca-zone');
  var files = zone && zone._getFiles ? zone._getFiles() : [];

  var savedContainer = document.getElementById('impl-ca-saved-files');
  var existingCount = savedContainer ? savedContainer.querySelectorAll('button').length : 0;
  if (!files.length && existingCount === 0) {
    return toast('Upload minimal 1 foto bukti corrective action.', 'error');
  }

  var ketCaEl = document.getElementById('impl-ca-ket');
  var keteranganCa = (ketCaEl || {}).value?.trim() || '';
  if (!keteranganCa) {
    return toast('Keterangan corrective action wajib diisi.', 'error');
  }

  var btn = document.getElementById('impl-ca-btn');
  var ketCaElLock = document.getElementById('impl-ca-ket');
  var corrZoneLock = document.getElementById('impl-correction-zone');
  var corrKetElLock = document.getElementById('impl-correction-ket');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:12px;height:12px;border-width:2px"></div> Mengirim...';
  if (zone) { zone.style.pointerEvents = 'none'; zone.style.opacity = '0.5'; }
  if (ketCaElLock) ketCaElLock.disabled = true;
  if (corrZoneLock) { corrZoneLock.style.pointerEvents = 'none'; corrZoneLock.style.opacity = '0.5'; }
  if (corrKetElLock) corrKetElLock.disabled = true;

  function _restoreCaForm() {
    btn.disabled = false;
    btn.innerHTML = '<i data-lucide="upload" style="width:13px;height:13px"></i> ' + (window._implCurrentRes && window._implCurrentRes.impl_submitted_at ? 'Submit Corrective Action Ulang' : 'Submit Corrective Action');
    if (zone) { zone.style.pointerEvents = ''; zone.style.opacity = ''; }
    if (ketCaElLock) ketCaElLock.disabled = false;
    if (corrZoneLock) { corrZoneLock.style.pointerEvents = ''; corrZoneLock.style.opacity = ''; }
    if (corrKetElLock) corrKetElLock.disabled = false;
    lucide.createIcons();
  }

  try {
    var tppData = await api('GET_TPP_ITEMS', { period_id: periodId, result_id: resultId, agenda_id: agendaId });
    var res = (tppData && tppData[0]) ? tppData[0] : {};

    // Correction belum pernah disubmit — bundling: Correction + CA disubmit sekaligus
    if (!res.impl_correction_submitted_at) {
      var corrZone = document.getElementById('impl-correction-zone');
      var corrFiles = corrZone && corrZone._getFiles ? corrZone._getFiles() : [];
      var corrSavedContainer = document.getElementById('impl-correction-saved-files');
      var corrExistingCount = corrSavedContainer ? corrSavedContainer.querySelectorAll('button').length : 0;
      var corrKetEl = document.getElementById('impl-correction-ket');
      var corrKeterangan = (corrKetEl || {}).value?.trim() || '';

      if (!corrFiles.length && corrExistingCount === 0) {
        _restoreCaForm();
        return toast('Correction belum disubmit. Upload minimal 1 foto bukti Correction terlebih dahulu.', 'error');
      }
      if (!corrKeterangan) {
        _restoreCaForm();
        return toast('Correction belum disubmit. Isi keterangan Correction terlebih dahulu.', 'error');
      }

      var corrB64files = await filesToBase64(corrFiles);
      var caB64files    = await filesToBase64(files);

      await api('SUBMIT_CORRECTION_AND_CA_IMPL', {
        period_id:  periodId,
        result_id:  resultId,
        agenda_id:  agendaId,
        correction_files:      corrB64files,
        correction_keterangan: corrKeterangan,
        ca_files:               caB64files,
        ca_keterangan:          keteranganCa,
      });
      clearCache('GET_ALL_FINDINGS_BY_PERIOD');
      clearCache('GET_DASHBOARD');
      clearCache('GET_HASIL_AUDIT');
      toast('Correction dan Corrective Action berhasil dikirim. Menunggu approval Dept Head.', 'success');
      navigateTo('mytask');
      return;
    }

    // Correction sudah pernah disubmit — submit CA seperti biasa
    var pendingDelsCa = (_implPendingDeletes && _implPendingDeletes.ca) || [];
    for (var _dca = 0; _dca < pendingDelsCa.length; _dca++) {
      try { await api('DELETE_DRIVE_FILE', { file_url: pendingDelsCa[_dca] }); }
      catch(e) { console.warn('[submitCAImpl] delete gagal (non-fatal):', e.message); }
    }
    var existingUrls = (res.impl_corrective_action_foto_urls || '').split(',').filter(Boolean)
      .filter(function(u) { return pendingDelsCa.indexOf(_fotoUrl(u)) === -1; })
      .join(',');
    _implPendingDeletes.ca = [];
    var b64files = await filesToBase64(files);
    await api('SUBMIT_CORRECTIVE_ACTION_IMPL', {
      period_id:  periodId,
      result_id:  resultId,
      agenda_id:  agendaId,
      files:      b64files,
      keterangan: keteranganCa,
      existing_foto_urls: existingUrls,
    });
    clearCache('GET_ALL_FINDINGS_BY_PERIOD');
    clearCache('GET_DASHBOARD');
    clearCache('GET_HASIL_AUDIT');
    toast('Bukti corrective action berhasil dikirim. Menunggu approval Dept Head.', 'success');
    navigateTo('mytask');
  } catch(err) {
    toast(err.message, 'error');
    _restoreCaForm();
  }
}

async function _processApproval(resultId, agendaId, periodId, stage, level, action) {
  var komentarEl = document.getElementById('apr-komentar');
  var komentar   = komentarEl ? komentarEl.value.trim() : '';
  if (action === 'REJECTED' && !komentar) {
    return toast('Isi komentar alasan penolakan terlebih dahulu.', 'error');
  }

  var approveBtn  = document.getElementById('apr-approve-btn');
  var rejectBtn   = document.getElementById('apr-reject-btn');
  var kembaliBtn  = document.querySelector('.btn.btn-outline[onclick="_backToMyTask()"]');
  var isApprove   = action === 'APPROVED';
  var activeBtn   = isApprove ? approveBtn : rejectBtn;
  var otherBtn    = isApprove ? rejectBtn  : approveBtn;

  // Lock semua tombol + textarea + spinner di tombol aktif
  if (activeBtn) {
    activeBtn.disabled  = true;
    activeBtn.innerHTML = '<div class="spinner" style="width:13px;height:13px;border-width:2px"></div> ' +
      (isApprove ? 'Menyetujui...' : 'Menolak...');
  }
  if (otherBtn)   otherBtn.disabled   = true;
  if (kembaliBtn) kembaliBtn.disabled = true;
  if (komentarEl) komentarEl.disabled = true;

  function _restoreApprovalForm() {
    if (approveBtn) {
      approveBtn.disabled  = false;
      approveBtn.innerHTML = '<i data-lucide="check-circle" style="width:13px;height:13px"></i> Approve';
    }
    if (rejectBtn) {
      rejectBtn.disabled  = false;
      rejectBtn.innerHTML = '<i data-lucide="x-circle" style="width:13px;height:13px"></i> Reject';
    }
    if (kembaliBtn) kembaliBtn.disabled = false;
    if (komentarEl) komentarEl.disabled = false;
    lucide.createIcons();
  }

  try {
    await api('PROCESS_APPROVAL', {
      period_id: periodId,
      result_id: resultId,
      agenda_id: agendaId,
      action:    action,
      komentar:  komentar,
    });
    clearCache('GET_ALL_FINDINGS_BY_PERIOD');
    clearCache('GET_DASHBOARD');
    clearCache('GET_HASIL_AUDIT');
    clearCache('GET_FINDINGS_BY_AGENDA');
    clearCache('GET_TPP_ITEMS');
    clearCache('GET_APPROVAL_LOG');
    toast(isApprove ? 'Berhasil di-approve.' : 'Ditolak. Auditee akan diberitahu.', 'success');
    navigateTo('mytask');
  } catch(err) {
    toast(err.message, 'error');
    _restoreApprovalForm();
  }
}

// ── Approval History ─────────────────────────────────────────

function _renderApprovalHistory(log, stage) {
  // Tampilkan semua event — tidak filter per stage agar history lengkap dari awal
  var relevant = (log || []).slice().sort(function(a, b) {
    return new Date(b.at) - new Date(a.at);
  });
  if (!relevant.length) return '';

  // Label per action + stage
  var _actionLabel = function(l) {
    if (l.action === 'VERIFIED')   return 'Temuan Diverifikasi';
    if (l.action === 'APPROVED') {
      if (l.stage === 'IMPL') return 'Tindak Lanjut Temuan Disetujui';
      if (l.stage === 'TPP')  return 'Rencana TPP Disetujui';
      return 'Disetujui';
    }
    if (l.action === 'REJECTED') {
      if (l.stage === 'IMPL') return 'Tindak Lanjut Temuan Ditolak';
      if (l.stage === 'TPP')  return 'Rencana TPP Ditolak';
      return 'Ditolak';
    }
    if (l.action === 'CLOSED')    return 'Temuan Ditutup';
    if (l.action === 'SUBMITTED') {
      if (l.stage === 'IMPL_CORRECTION') return 'Bukti Correction Disubmit';
      if (l.stage === 'IMPL_CA')         return 'Bukti Corrective Action Disubmit';
      if (l.stage === 'TPP')             return 'Rencana TPP Disubmit';
      return 'Disubmit';
    }
    if (l.action === 'ROUTING') return 'Tindak Lanjut Diteruskan ke Approval';
    return l.action;
  };

  var _iconAndColor = function(l) {
    if (l.action === 'APPROVED' || l.action === 'VERIFIED')
      return { icon: 'check', color: 'var(--emerald,#10b981)' };
    if (l.action === 'REJECTED')
      return { icon: 'x', color: 'var(--rose,#f43f5e)' };
    if (l.action === 'SUBMITTED')
      return { icon: 'upload', color: 'var(--blue,#3b82f6)' };
    if (l.action === 'ROUTING')
      return { icon: 'arrow-right-circle', color: 'var(--purple,#8b5cf6)' };
    if (l.action === 'CLOSED')
      return { icon: 'check-circle', color: 'var(--emerald,#10b981)' };
    return { icon: 'clock', color: 'var(--text-muted)' };
  };

  return '<div class="card mb-16">' +
    '<div class="card-body" style="padding:12px 16px">' +
      '<div style="font-size:11px;font-weight:700;color:var(--text-muted);' +
          'margin-bottom:10px;letter-spacing:.06em">RIWAYAT DOKUMEN</div>' +
      relevant.map(function(l, idx) {
        var ic       = _iconAndColor(l);
        var isLast   = idx === relevant.length - 1;
        var isSkipped = l.skipped === true || l.skipped === 'TRUE';
        return '<div style="display:flex;gap:10px;align-items:flex-start;' +
            'padding:8px 0;' + (!isLast ? 'border-bottom:1px solid var(--border)' : '') + '">' +

          // Ikon bulat
          '<div style="width:22px;height:22px;border-radius:50%;flex-shrink:0;' +
              'background:' + ic.color + ';' +
              'display:flex;align-items:center;justify-content:center;margin-top:1px">' +
            '<i data-lucide="' + ic.icon + '" style="width:11px;height:11px;color:#fff"></i>' +
          '</div>' +

          '<div style="flex:1;min-width:0">' +

            // Baris pertama: label aksi + badge stage
            '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">' +
              '<span style="font-size:12px;font-weight:600">' + _actionLabel(l) + '</span>' +
              (function() {
                var stageClassMap = {
                  'IMPL_CORRECTION': 'badge-correction',
                  'IMPL_CA':         'badge-corrective-action',
                  'IMPL':            'badge-teal',
                  'TPP':             'badge-slate',
                  'VERIFICATION':    'badge-amber',
                };
                var cls = stageClassMap[l.stage] || 'badge-slate';
                var stageLabel = {
                  'IMPL_CORRECTION': 'CORRECTION',
                  'IMPL_CA':         'CORRECTIVE ACTION',
                  'IMPL':            'IMPLEMENTASI',
                  'TPP':             'RENCANA TPP',
                  'VERIFICATION':    'VERIFIKASI',
                }[l.stage] || escHtml((l.stage || '').toUpperCase());
                return '<span class="badge ' + cls + '" style="font-size:10px">' + stageLabel + '</span>';
              })() +
              (isSkipped ? '<span class="badge badge-amber" style="font-size:10px">Skip</span>' : '') +
            '</div>' +

            // Baris kedua: siapa + kapan
            '<div style="font-size:11px;color:var(--text-muted);margin-top:2px">' +
              escHtml(l.level || '') +
              (l.by_email ? ' · ' + escHtml(l.by_email.split('@')[0]) : '') +
              ' · ' + formatDate(l.at) +
            '</div>' +

            // Komentar kalau ada
            (l.komentar
              ? '<div style="font-size:12px;margin-top:4px;padding:6px 8px;' +
                  'background:' + (l.action === 'REJECTED' ? '#fff1f2' : 'var(--bg)') + ';' +
                  'border-left:2px solid ' + ic.color + ';' +
                  'border-radius:0 4px 4px 0;color:' +
                  (l.action === 'REJECTED' ? 'var(--rose,#f43f5e)' : 'var(--text)') + '">' +
                  escHtml(l.komentar) +
                '</div>'
              : '') +

          '</div>' +
        '</div>';
      }).join('') +
    '</div>' +
  '</div>';
}
</script>
