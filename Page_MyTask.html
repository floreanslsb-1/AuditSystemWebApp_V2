    var log = await api('GET_APPROVAL_LOG', {
      period_id: period.period_id,
      result_id: task.result_id,
    });
    var f     = task.finding;
    var res   = (tppData && tppData[0]) ? tppData[0] : {};
    var stage = task.type === 'APPROVAL_TPP' ? 'TPP' : 'IMPL';
    var isTPP = stage === 'TPP';

    var historyHtml = _renderApprovalHistory(log, stage);

    // ── Foto temuan asli (selalu ditampilkan) ────────────────
    var fotoTemuan = f && f.foto_urls
      ? '<div style="margin-bottom:12px;padding:10px;background:var(--bg);border-radius:6px;border:1px solid var(--border)">' +
          '<div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:6px;letter-spacing:.04em">FOTO BUKTI TEMUAN ASLI</div>' +
          '<div style="display:flex;flex-wrap:wrap;gap:6px">' +
            f.foto_urls.split(',').filter(Boolean).map(function(url) {
              return '<a href="' + escHtml(url) + '" target="_blank" class="btn btn-outline btn-sm" style="font-size:11px">' +
                '<i data-lucide="image" style="width:11px;height:11px"></i> Lihat Foto Temuan</a>';
            }).join('') +
          '</div>' +
        '</div>'
      : '';

    // ── Content berdasarkan stage ────────────────────────────
    var contentHtml = isTPP
      // APPROVAL TPP — tampilkan rencana correction + corrective action
      ? '<div class="card mb-16"><div class="card-body">' +
          '<div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px">RENCANA TPP</div>' +

          // Correction
          '<div style="padding:12px;border:1px solid var(--border);border-radius:6px;margin-bottom:10px">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
              '<span class="badge badge-blue" style="font-size:10px">Correction</span>' +
              '<span style="font-size:11px;color:var(--text-muted)">' +
                'Due: <strong>' + formatDate(res.due_date_correction || '') + '</strong>' +
              '</span>' +
            '</div>' +
            '<div style="font-size:13px">' + escHtml(res.correction || '-') + '</div>' +
          '</div>' +

          // Corrective Action
          '<div style="padding:12px;border:1px solid var(--border);border-radius:6px;margin-bottom:10px">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
              '<span class="badge badge-purple" style="font-size:10px">Corrective Action</span>' +
              '<span style="font-size:11px;color:var(--text-muted)">' +
                'Due: <strong>' + formatDate(res.due_date_corrective_action || '') + '</strong>' +
              '</span>' +
            '</div>' +
            '<div style="font-size:13px">' + escHtml(res.corrective_action || '-') + '</div>' +
          '</div>' +

          fotoTemuan +
        '</div></div>'

      // APPROVAL IMPL — tampilkan bukti correction + corrective action
      : '<div class="card mb-16"><div class="card-body">' +
          fotoTemuan +
          '<div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px">BUKTI IMPLEMENTASI</div>' +

          // Correction impl
          '<div style="padding:12px;border:1px solid var(--border);border-radius:6px;margin-bottom:10px">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
              '<span class="badge badge-blue" style="font-size:10px">Correction</span>' +
              (res.impl_correction_submitted_at
                ? '<span class="badge badge-emerald" style="font-size:10px">✓ Disubmit ' + formatDate(res.impl_correction_submitted_at) + '</span>'
                : '<span class="badge badge-rose" style="font-size:10px">Belum disubmit</span>') +
            '</div>' +
            '<div style="font-size:13px;margin-bottom:8px">' + escHtml(res.correction || '-') + '</div>' +
            (res.impl_correction_foto_urls
              ? '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
                  res.impl_correction_foto_urls.split(',').filter(Boolean).map(function(url) {
                    return '<a href="' + url + '" target="_blank" class="btn btn-outline btn-sm">' +
                      '<i data-lucide="image" style="width:12px;height:12px"></i> Lihat Bukti</a>';
                  }).join('') +
                '</div>'
              : '<div style="font-size:12px;color:var(--text-muted)">Belum ada bukti correction diupload.</div>') +
          '</div>' +

          // Corrective Action impl
          '<div style="padding:12px;border:1px solid var(--border);border-radius:6px;margin-bottom:10px">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
              '<span class="badge badge-purple" style="font-size:10px">Corrective Action</span>' +
              (res.impl_submitted_at
                ? '<span class="badge badge-emerald" style="font-size:10px">✓ Disubmit ' + formatDate(res.impl_submitted_at) + '</span>'
                : '<span class="badge badge-rose" style="font-size:10px">Belum disubmit</span>') +
            '</div>' +
            '<div style="font-size:13px;margin-bottom:8px">' + escHtml(res.corrective_action || '-') + '</div>' +
            (res.impl_corrective_action_foto_urls
              ? '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
                  res.impl_corrective_action_foto_urls.split(',').filter(Boolean).map(function(url) {
                    return '<a href="' + url + '" target="_blank" class="btn btn-outline btn-sm">' +
                      '<i data-lucide="image" style="width:12px;height:12px"></i> Lihat Bukti</a>';
                  }).join('') +
                '</div>'
              : '<div style="font-size:12px;color:var(--text-muted)">Belum ada bukti corrective action diupload.</div>') +
          '</div>' +

        '</div></div>';

    container.innerHTML =
      _subPageHeader(
        (isTPP ? 'Approval TPP' : 'Approval Implementasi') +
          ' — ' + escHtml(task.agenda ? task.agenda.dept : ''),
        '#' + (f ? f.nomor_persyaratan + '.' + f.check_item_no : '') +
        ' · ' + escHtml(f ? f.deskripsi_temuan : '')
      ) +

      // Info temuan
      '<div class="card mb-16"><div class="card-body" style="padding:12px 16px">' +
        statusBadge(f ? f.status : '') + ' ' +
        '<span style="font-size:13px;font-weight:600">' + escHtml(f ? f.deskripsi_temuan : '') + '</span>' +
      '</div></div>' +

      contentHtml +
      historyHtml +

      // Komentar + tombol approve/reject
      '<div class="card"><div class="card-body">' +
        '<div class="form-group">' +
          '<label class="form-label">Komentar <span style="font-size:11px;color:var(--text-muted)">(wajib jika menolak)</span></label>' +
          '<textarea class="form-control" id="apr-komentar" rows="2" placeholder="Tulis komentar..."></textarea>' +
        '</div>' +
        '<div style="display:flex;gap:8px;justify-content:flex-end">' +
          '<button class="btn btn-outline" onclick="_backToMyTask()">Kembali</button>' +
          '<button class="btn btn-danger btn-sm" id="apr-reject-btn" ' +
            'onclick="singleClick(this,function(){ _processApproval(\'' +
              task.result_id + '\',\'' + task.agenda_id + '\',\'' +
              period.period_id + '\',\'' + stage + '\',\'' + (task.level || '') + '\',\'REJECTED\') })">' +
            '<i data-lucide="x-circle" style="width:13px;height:13px"></i> Reject' +
          '</button>' +
          '<button class="btn btn-success" id="apr-approve-btn" ' +
            'onclick="singleClick(this,function(){ _processApproval(\'' +
              task.result_id + '\',\'' + task.agenda_id + '\',\'' +
              period.period_id + '\',\'' + stage + '\',\'' + (task.level || '') + '\',\'APPROVED\') })">' +
            '<i data-lucide="check-circle" style="width:13px;height:13px"></i> Approve' +
          '</button>' +
        '</div>' +
      '</div></div>';

    lucide.createIcons();
  } catch(err) {
    container.innerHTML = _subPageHeader('Approval', '') +
      '<div class="empty-state"><div class="empty-desc">' + escHtml(err.message) + '</div></div>';
    lucide.createIcons();
  }
}

async function _processApproval(resultId, agendaId, periodId, stage, level, action) {
  var komentar = document.getElementById('apr-komentar') ?
    document.getElementById('apr-komentar').value.trim() : '';
  if (action === 'REJECTED' && !komentar) {
    return toast('Isi komentar alasan penolakan terlebih dahulu.', 'error');
  }

  var btnId   = action === 'APPROVED' ? 'apr-approve-btn' : 'apr-reject-btn';
  var btn     = document.getElementById(btnId);
  btn.disabled = true;

  try {
    await api('PROCESS_APPROVAL', {
      period_id: periodId,
      result_id: resultId,
      agenda_id: agendaId,
      action:    action,
      komentar:  komentar,
      // stage & level dihapus — derive dari finding_status di server
    });
    clearCache('GET_ALL_FINDINGS_BY_PERIOD');
    clearCache('GET_FINDINGS_BY_AGENDA');
    clearCache('GET_TPP_ITEMS');
    clearCache('GET_APPROVAL_LOG');
    toast(action === 'APPROVED' ? 'Berhasil di-approve.' : 'Ditolak. Auditee akan diberitahu.', 'success');
    navigateTo('mytask');
  } catch(err) {
    toast(err.message, 'error');
    btn.disabled = false;
  }
}

// ── Mass Approve ─────────────────────────────────────────────

async function _massApproveAll(stage) {
  var tasks = (window._myTaskList || []).filter(function(t) {
    return t.type === 'APPROVAL_' + stage;
  });
  if (!tasks.length) return;

  var ok = await showConfirm({
    title:       'Mass Approve ' + stage,
    message:     'Approve ' + tasks.length + ' finding sekaligus?',
    confirmText: 'Approve Semua',
  });
  if (!ok) return;

  var period = window._myTaskPeriod;
  // Mass approve hanya tersedia untuk Koordinator (bar-nya hanya dirender untuk Koordinator)
  var level  = 'Koordinator';

  try {
    await api('MASS_APPROVE', {
      period_id:  period.period_id,
      result_ids: tasks.map(function(t) { return t.result_id; }),
      agenda_ids: tasks.map(function(t) { return t.agenda_id; }),
      // stage & level dihapus — derive dari finding_status di server
    });
    clearCache('GET_ALL_FINDINGS_BY_PERIOD');
    toast(tasks.length + ' finding berhasil di-approve.', 'success');
    navigateTo('mytask');
  } catch(err) { toast(err.message, 'error'); }
}

// ── Approval History ─────────────────────────────────────────

function _renderApprovalHistory(log, stage) {
  // Tampilkan semua event — tidak filter per stage agar history lengkap dari awal
  var relevant = (log || []).slice().sort(function(a, b) {
    return new Date(b.at) - new Date(a.at);
  });
  if (!relevant.length) return '';

  // Label per action + stage
  var _actionLabel = function(l) {
    if (l.action === 'VERIFIED')   return 'Diverifikasi';
    if (l.action === 'APPROVED')   return 'Disetujui';
    if (l.action === 'REJECTED')   return 'Ditolak';
    if (l.action === 'SUBMITTED') {
      if (l.stage === 'CORRECTION') return 'Bukti Correction Disubmit';
      if (l.stage === 'IMPL')       return 'Bukti Impl. Disubmit';
      return 'TPP Disubmit';
    }
    return l.action;
  };

  var _iconAndColor = function(l) {
    if (l.action === 'APPROVED' || l.action === 'VERIFIED')
      return { icon: 'check', color: 'var(--emerald,#10b981)' };
    if (l.action === 'REJECTED')
      return { icon: 'x', color: 'var(--rose,#f43f5e)' };
    if (l.action === 'SUBMITTED')
      return { icon: 'upload', color: 'var(--blue,#3b82f6)' };
    return { icon: 'clock', color: 'var(--text-muted)' };
  };

  return '<div class="card mb-16">' +
    '<div class="card-body" style="padding:12px 16px">' +
      '<div style="font-size:11px;font-weight:700;color:var(--text-muted);' +
          'margin-bottom:10px;letter-spacing:.06em">RIWAYAT DOKUMEN</div>' +
      relevant.map(function(l, idx) {
        var ic       = _iconAndColor(l);
        var isLast   = idx === relevant.length - 1;
        var isSkipped = l.skipped === true || l.skipped === 'TRUE';
        return '<div style="display:flex;gap:10px;align-items:flex-start;' +
            'padding:8px 0;' + (!isLast ? 'border-bottom:1px solid var(--border)' : '') + '">' +

          // Ikon bulat
          '<div style="width:22px;height:22px;border-radius:50%;flex-shrink:0;' +
              'background:' + ic.color + ';' +
              'display:flex;align-items:center;justify-content:center;margin-top:1px">' +
            '<i data-lucide="' + ic.icon + '" style="width:11px;height:11px;color:#fff"></i>' +
          '</div>' +

          '<div style="flex:1;min-width:0">' +

            // Baris pertama: label aksi + badge stage
            '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">' +
              '<span style="font-size:12px;font-weight:600">' + _actionLabel(l) + '</span>' +
              '<span style="font-size:10px;background:var(--surface-2,#f3f4f6);' +
                  'color:var(--text-muted);padding:1px 6px;border-radius:4px">' +
                escHtml(l.stage || '') +
              '</span>' +
              (isSkipped ? '<span class="badge badge-amber" style="font-size:10px">Skip</span>' : '') +
            '</div>' +

            // Baris kedua: siapa + kapan
            '<div style="font-size:11px;color:var(--text-muted);margin-top:2px">' +
              escHtml(l.level || '') +
              (l.by_email ? ' · ' + escHtml(l.by_email.split('@')[0]) : '') +
              ' · ' + formatDate(l.at) +
            '</div>' +

            // Komentar kalau ada
            (l.komentar
              ? '<div style="font-size:12px;margin-top:4px;padding:6px 8px;' +
                  'background:' + (l.action === 'REJECTED' ? '#fff1f2' : 'var(--bg)') + ';' +
                  'border-left:2px solid ' + ic.color + ';' +
                  'border-radius:0 4px 4px 0;color:' +
                  (l.action === 'REJECTED' ? 'var(--rose,#f43f5e)' : 'var(--text)') + '">' +
                  escHtml(l.komentar) +
                '</div>'
              : '') +

          '</div>' +
        '</div>';
      }).join('') +
    '</div>' +
  '</div>';
}
</script>
