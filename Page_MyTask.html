<script>
// ============================================================
//  Page_MyTask.html
//  Semua task yang perlu ditindaklanjuti user
// ============================================================

Pages['mytask'] = async function(container) {
  container.innerHTML =
    '<div class="page-loader"><div class="spinner dark"></div><span>Memuat tugas...</span></div>';

  var period = App.activePeriod;
  if (!period) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<i data-lucide="calendar-off" style="width:48px;height:48px;opacity:.3;margin-bottom:16px"></i>' +
        '<div class="empty-title">Tidak Ada Periode Aktif</div>' +
        '<div class="empty-desc">My Task hanya tersedia saat periode audit aktif.</div>' +
      '</div>';
    lucide.createIcons();
    return;
  }

  try {
    var results  = await Promise.all([
      cachedApi('GET_AGENDAS_BY_PERIOD',     { period_id: period.period_id }, 30),
      cachedApi('GET_ALL_FINDINGS_BY_PERIOD', { period_id: period.period_id }, 15),
    ]);
    var agendas  = results[0];
    var findings = results[1];

    findings.forEach(function(f) {
      f._agenda = agendas.find(function(a) { return a.agenda_id === f.agenda_id; });
    });

    var tasks = await _buildTaskList(findings, agendas, period);

    _renderMyTask(container, tasks, period);
  } catch(err) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<i data-lucide="alert-triangle" style="width:48px;height:48px;opacity:.3;margin-bottom:16px"></i>' +
        '<div class="empty-title">Gagal Memuat</div>' +
        '<div class="empty-desc">' + escHtml(err.message) + '</div>' +
      '</div>';
    lucide.createIcons();
  }
};

// ── Build task list ───────────────────────────────────────────

async function _buildTaskList(findings, agendas, period) {
  var p     = App.profile || {};
  var tasks = [];

  // ── 1. VERIFIKASI TEMUAN (Koordinator) ───────────────────
  if (p.isKoordinator) {
    var pendingVerif = {};
    findings
      .filter(function(f) {
        return f.finding_status === 'PENDING_VERIFICATION';
      })
      .forEach(function(f) {
        var aid = f.agenda_id;
        if (!pendingVerif[aid]) {
          pendingVerif[aid] = {
            type:       'VERIFIKASI',
            badge:      'badge-amber',
            label:      'Verifikasi Temuan',
            agenda:     f._agenda,
            agenda_id:  aid,
            period_id:  period.period_id,
            findings:   [],
            icon:       'shield-check',
          };
        }
        pendingVerif[aid].findings.push(f);
      });
    Object.values(pendingVerif).forEach(function(t) { tasks.push(t); });
  }

  // ── 2. ISI TPP (Auditee — DeptHead dikecualikan) ─────────
  if (p.isAuditee && !p.isDeptHead) {
    findings
      .filter(function(f) {
        return f.finding_status === 'OPEN' &&
          f._agenda && _isAuditeeOf(f._agenda, p.email);
      })
      .forEach(function(f) {
        tasks.push({
          type:       'ISI_TPP',
          badge:      'badge-blue',
          label:      'Isi TPP',
          agenda:     f._agenda,
          agenda_id:  f.agenda_id,
          period_id:  period.period_id,
          finding:    f,
          result_id:  f.result_id,
          icon:       'wrench',
          desc:       '#' + f.nomor_persyaratan + '.' + f.check_item_no +
                      ' · ' + escHtml(f._agenda ? f._agenda.dept : ''),
        });
      });
  }

  // ── 3. UPLOAD IMPLEMENTASI (Auditee — DeptHead dikecualikan) ─────────────
  if (p.isAuditee && !p.isDeptHead) {
    findings
      .filter(function(f) {
        return f.finding_status === 'OPEN_IMPL' &&
          f._agenda && _isAuditeeOf(f._agenda, p.email);
      })
      .forEach(function(f) {
        tasks.push({
          type:       'UPLOAD_IMPL',
          badge:      'badge-purple',
          label:      'Upload Implementasi',
          agenda:     f._agenda,
          agenda_id:  f.agenda_id,
          period_id:  period.period_id,
          finding:    f,
          result_id:  f.result_id,
          icon:       'camera',
          desc:       '#' + f.nomor_persyaratan + '.' + f.check_item_no +
                      ' · ' + escHtml(f._agenda ? f._agenda.dept : ''),
        });
      });
  }

// ── 4 & 5. APPROVAL TPP / IMPLEMENTASI ───────────────────
// Finding_status sudah embed stage & level — tidak perlu baca APPROVAL_LOG
// Filter langsung berdasarkan status dan match ke profile user

  var APPROVAL_STATUS_MAP = {
    'TPP_OR_DEPT_HEAD':   { type: 'APPROVAL_TPP',  label: 'Review TPP',          badge: 'badge-amber',   icon: 'check-circle',  matchFn: function(p, ag) { return !!p.isDeptHead && ag && p.deptHeadAreas && p.deptHeadAreas.indexOf(ag.area_id) !== -1; } },
    'TPP_OR_AUDITOR':     { type: 'APPROVAL_TPP',  label: 'Review TPP',          badge: 'badge-amber',   icon: 'check-circle',  matchFn: function(p, ag) { return !!p.isAuditor  && ag && _emailInCsv(ag.auditor_emails, p.email); } },
    'TPP_OR_KOORDINATOR': { type: 'APPROVAL_TPP',  label: 'Approval TPP Final',  badge: 'badge-teal',    icon: 'check-circle',  matchFn: function(p)     { return !!p.isKoordinator; } },
    'APP_DEPT_HEAD':      { type: 'APPROVAL_IMPL', label: 'Review Implementasi', badge: 'badge-purple',  icon: 'upload-cloud',  matchFn: function(p, ag) { return !!p.isDeptHead && ag && p.deptHeadAreas && p.deptHeadAreas.indexOf(ag.area_id) !== -1; } },
    'APP_AUDITOR':        { type: 'APPROVAL_IMPL', label: 'Review Implementasi', badge: 'badge-purple',  icon: 'upload-cloud',  matchFn: function(p, ag) { return !!p.isAuditor  && ag && _emailInCsv(ag.auditor_emails, p.email); } },
    'APP_KOORDINATOR':    { type: 'APPROVAL_IMPL', label: 'Approval Impl Final', badge: 'badge-emerald', icon: 'upload-cloud',  matchFn: function(p)     { return !!p.isKoordinator; } },
  };

  findings.forEach(function(f) {
    var meta = APPROVAL_STATUS_MAP[f.finding_status];
    if (!meta) return;                           // status bukan approval status
    var ag = f._agenda;
    if (!meta.matchFn(p, ag)) return;            // user tidak berhak di status ini

    tasks.push({
      type:      meta.type,
      badge:     meta.badge,
      label:     meta.label,
      agenda:    ag,
      agenda_id: f.agenda_id,
      period_id: period.period_id,
      finding:   f,
      result_id: f.result_id,
      icon:      meta.icon,
      desc:      '#' + f.nomor_persyaratan + '.' + f.check_item_no +
                 ' · ' + escHtml(ag ? ag.dept : ''),
    });
  });

  return tasks;
}

function _isAuditeeOf(agenda, email) {
  if (!agenda || !agenda.auditee_emails || !email) return false;
  var target = String(email).trim().toLowerCase();
  return String(agenda.auditee_emails).split(',')
    .map(function(e) { return e.trim().toLowerCase(); })
    .indexOf(target) !== -1;
}

function _emailInCsv(csv, email) {
  if (!csv || !email) return false;
  var target = String(email).trim().toLowerCase();
  return String(csv).split(',')
    .map(function(e) { return e.trim().toLowerCase(); })
    .indexOf(target) !== -1;
}

// ── Render My Task ────────────────────────────────────────────

function _renderMyTask(container, tasks, period) {
  var totalTasks = tasks.length;

  var listHtml = '';
  if (!tasks.length) {
    listHtml =
      '<div class="card"><div class="card-body empty-state" style="padding:60px">' +
        '<i data-lucide="party-popper" style="width:48px;height:48px;opacity:.2;margin-bottom:16px"></i>' +
        '<div class="empty-title">Tidak Ada Tugas</div>' +
        '<div class="empty-desc">Semua sudah beres. Tidak ada yang perlu ditindaklanjuti saat ini.</div>' +
      '</div></div>';
  } else {
    // Group by type untuk mass approve
    var verifikasiTasks = tasks.filter(function(t) { return t.type === 'VERIFIKASI'; });
    var approvalTppTasks = tasks.filter(function(t) { return t.type === 'APPROVAL_TPP'; });
    var approvalImplTasks = tasks.filter(function(t) { return t.type === 'APPROVAL_IMPL'; });

    listHtml =
      '<div class="card">' +
        // Mass approve bar — hanya kalau ada approval tasks
        ((approvalTppTasks.length > 1 || approvalImplTasks.length > 1) && App.profile.isKoordinator
          ? '<div style="padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg);' +
              'display:flex;align-items:center;gap:10px;flex-wrap:wrap">' +
              '<span style="font-size:12px;color:var(--text-muted)">Mass approve:</span>' +
              (approvalTppTasks.length > 1
                ? '<button class="btn btn-outline btn-sm" onclick="_massApproveAll(\'TPP\')">' +
                    '<i data-lucide="check-circle" style="width:13px;height:13px"></i> ' +
                    'Approve Semua TPP (' + approvalTppTasks.length + ')' +
                  '</button>'
                : '') +
              (approvalImplTasks.length > 1
                ? '<button class="btn btn-outline btn-sm" onclick="_massApproveAll(\'IMPL\')">' +
                    '<i data-lucide="check-circle" style="width:13px;height:13px"></i> ' +
                    'Approve Semua Implementasi (' + approvalImplTasks.length + ')' +
                  '</button>'
                : '') +
            '</div>'
          : '') +
        '<div class="table-wrap"><table>' +
          '<thead><tr>' +
            '<th style="width:130px">Tipe</th>' +
            '<th>Detail</th>' +
            '<th style="width:140px">Area</th>' +
            '<th style="width:100px">Role</th>' +
            '<th style="width:48px"></th>' +
          '</tr></thead>' +
          '<tbody>' +
            tasks.map(function(t, idx) {
              var areaName = t.agenda ? escHtml(t.agenda.dept) : '—';
              var roleLabel = t.level || (t.type === 'ISI_TPP' || t.type === 'UPLOAD_IMPL' ? 'Auditee' : 'Koordinator');
              var detailHtml = '';

              if (t.type === 'VERIFIKASI') {
                detailHtml = '<strong>' + t.findings.length + ' temuan</strong> menunggu verifikasi';
              } else {
                detailHtml = '<span class="td-mono" style="font-size:11px">' +
                  escHtml(t.result_id ? t.result_id.split('_').slice(-2).join('_') : '') +
                  '</span>' +
                  (t.finding ? ' · ' + statusBadge(t.finding.status) : '');
              }

              return '<tr style="cursor:pointer" onclick="_openTaskDetail(' + idx + ')" ' +
                'onmouseover="this.style.background=\'var(--bg)\'" ' +
                'onmouseout="this.style.background=\'\'">' +
                '<td>' +
                  '<span class="badge ' + t.badge + '" style="display:inline-flex;align-items:center;gap:5px">' +
                    '<i data-lucide="' + t.icon + '" style="width:11px;height:11px"></i>' +
                    escHtml(t.label) +
                  '</span>' +
                '</td>' +
                '<td>' + detailHtml + '</td>' +
                '<td class="text-sm">' + areaName + '</td>' +
                '<td><span class="badge badge-slate" style="font-size:10px">' + escHtml(roleLabel) + '</span></td>' +
                '<td><i data-lucide="chevron-right" style="width:14px;height:14px;color:var(--text-muted)"></i></td>' +
              '</tr>';
            }).join('') +
          '</tbody>' +
        '</table></div>' +
      '</div>';
  }

  container.innerHTML =
    '<div class="page-hero mb-24">' +
      '<h1 style="display:flex;align-items:center;gap:10px">' +
        '<i data-lucide="list-checks" style="width:24px;height:24px"></i> My Task' +
      '</h1>' +
      '<p>Periode: <strong style="color:#fff">' + escHtml(period.nama_periode) + '</strong>' +
        (totalTasks > 0
          ? ' · <strong style="color:#fff">' + totalTasks + '</strong> tugas perlu ditindaklanjuti'
          : ' · Tidak ada tugas') +
      '</p>' +
    '</div>' +
    listHtml;

  // Simpan tasks ke window untuk dipakai saat klik
  window._myTaskList = tasks;
  window._myTaskPeriod = period;

  lucide.createIcons();
}

// ── Task Detail (sub-page) ────────────────────────────────────

function _openTaskDetail(idx) {
  var task   = window._myTaskList[idx];
  var period = window._myTaskPeriod;
  if (!task) return;

  var container = document.getElementById('page-content');
  window._myTaskReturnIdx = idx;

  switch (task.type) {
    case 'VERIFIKASI':    _renderVerifikasiPage(container, task, period); break;
    case 'ISI_TPP':       _renderIsiTppPage(container, task, period);     break;
    case 'UPLOAD_IMPL':   _renderUploadImplPage(container, task, period); break;
    case 'APPROVAL_TPP':
    case 'APPROVAL_IMPL': _renderApprovalPage(container, task, period);   break;
  }
}

function _backToMyTask() {
  navigateTo('mytask');
}

function _subPageHeader(title, subtitle) {
  return '<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">' +
    '<button class="btn btn-ghost btn-icon" onclick="_backToMyTask()" title="Kembali">' +
      '<i data-lucide="arrow-left" style="width:16px;height:16px"></i>' +
    '</button>' +
    '<div>' +
      '<div style="font-size:15px;font-weight:700">' + title + '</div>' +
      '<div style="font-size:12px;color:var(--text-muted)">' + subtitle + '</div>' +
    '</div>' +
  '</div>';
}

// ════════════════════════════════════════════════════════════
//  SUB-PAGE: VERIFIKASI TEMUAN (Koordinator)
// ════════════════════════════════════════════════════════════

async function _renderVerifikasiPage(container, task, period) {
  container.innerHTML =
    '<div class="page-loader"><div class="spinner dark"></div><span>Memuat temuan...</span></div>';

  try {
    var findings = await api('GET_FINDINGS_BY_AGENDA', {
      period_id: period.period_id,
      agenda_id: task.agenda_id,
    });
    var pendingFindings = findings.filter(function(f) {
      return f.finding_status === 'PENDING_VERIFICATION';
    });

    var cardsHtml = pendingFindings.map(function(f, i) {
      return '<div class="card mb-12" id="verif-card-' + i + '">' +
        '<div class="card-body">' +
          '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">' +
            statusBadge(f.status) +
            '<span class="td-mono" style="font-size:11px">#' + f.nomor_persyaratan + '.' + f.check_item_no + '</span>' +
            '<span style="font-size:12px;color:var(--text-muted);flex:1">' + escHtml(f.result_id) + '</span>' +
          '</div>' +
          // Deskripsi temuan (editable)
          '<div class="form-group">' +
            '<label class="form-label">Deskripsi Temuan</label>' +
            '<textarea class="form-control" id="verif-desc-' + i + '" rows="3">' +
              escHtml(f.deskripsi_temuan) +
            '</textarea>' +
          '</div>' +
          // Status persyaratan (editable, dengan aturan transisi)
          '<div class="form-group">' +
            '<label class="form-label">Jenis Temuan</label>' +
            '<select class="form-control" id="verif-status-' + i + '" style="max-width:200px">' +
              _buildStatusOptions(f.status) +
            '</select>' +
            '<div class="form-hint">Ubah ke Comply = temuan langsung ditutup tanpa TPP.</div>' +
          '</div>' +
          // Foto
          (f.foto_urls
            ? '<div class="form-group">' +
                '<label class="form-label">Foto Bukti (existing)</label>' +
                '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
                  f.foto_urls.split(',').filter(Boolean).map(function(url) {
                    return '<a href="' + url + '" target="_blank" class="btn btn-outline btn-sm">' +
                      '<i data-lucide="image" style="width:12px;height:12px"></i> Lihat Foto' +
                    '</a>';
                  }).join('') +
                '</div>' +
              '</div>'
            : '') +
          // Hapus temuan
          '<button class="btn btn-ghost btn-sm" style="color:var(--rose)" ' +
            'onclick="_confirmDeleteFinding(\'' + f.result_id + '\',\'' + task.agenda_id + '\',\'' + period.period_id + '\',' + i + ')">' +
            '<i data-lucide="trash-2" style="width:13px;height:13px"></i> Hapus Temuan Ini' +
          '</button>' +
        '</div>' +
        '<input type="hidden" id="verif-fid-' + i + '" value="' + escHtml(f.result_id) + '">' +
      '</div>';
    }).join('');

    container.innerHTML =
      _subPageHeader(
        'Verifikasi Temuan — ' + escHtml(task.agenda ? task.agenda.dept : ''),
        pendingFindings.length + ' temuan menunggu verifikasi'
      ) +
      (pendingFindings.length === 0
        ? '<div class="card"><div class="card-body empty-state"><div class="empty-desc">Tidak ada temuan yang perlu diverifikasi.</div></div></div>'
        : cardsHtml +
          '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">' +
            '<button class="btn btn-outline" onclick="_backToMyTask()">Batal</button>' +
            '<button class="btn btn-primary" id="verif-submit-btn" ' +
              'onclick="singleClick(this,function(){ _submitVerifikasi(' +
                pendingFindings.length + ',\'' + task.agenda_id + '\',\'' + period.period_id + '\') })">' +
              '<i data-lucide="shield-check" style="width:14px;height:14px"></i> Verifikasi Semua' +
            '</button>' +
          '</div>'
      );
    lucide.createIcons();
  } catch(err) {
    container.innerHTML = _subPageHeader('Verifikasi Temuan', '') +
      '<div class="empty-state"><div class="empty-desc">' + escHtml(err.message) + '</div></div>';
    lucide.createIcons();
  }
}

function _buildStatusOptions(current) {
  var options = ['Non Comply', 'Comply'];
  return options.map(function(s) {
    return '<option value="' + s + '" ' + (s === current ? 'selected' : '') + '>' + s + '</option>';
  }).join('');
}

async function _confirmDeleteFinding(resultId, agendaId, periodId, cardIdx) {
  var ok = await showConfirm({
    title:       'Hapus Temuan',
    message:     'Hapus temuan ini?',
    detail:      'Check item akan dikembalikan ke status Comply.',
    confirmText: 'Hapus',
    danger:      true,
  });
  if (!ok) return;
  try {
    await api('VERIFY_FINDINGS', {
      period_id: periodId,
      agenda_id: agendaId,
      updates: [{ result_id: resultId, final_status: 'Comply' }],
    });
    var card = document.getElementById('verif-card-' + cardIdx);
    if (card) card.remove();
    clearCache('GET_ALL_FINDINGS_BY_PERIOD');
    clearCache('GET_FINDINGS_BY_AGENDA');
    toast('Temuan dihapus. Check item dikembalikan ke Comply.', 'success');
  } catch(err) { toast(err.message, 'error'); }
}

async function _submitVerifikasi(count, agendaId, periodId) {
  var updates = [];
  for (var i = 0; i < count; i++) {
    var fidEl  = document.getElementById('verif-fid-'    + i);
    var descEl = document.getElementById('verif-desc-'   + i);
    var statEl = document.getElementById('verif-status-' + i);
    if (!fidEl) continue; // sudah dihapus
    updates.push({
      result_id:          fidEl.value,
      deskripsi_temuan:   descEl ? descEl.value.trim() : '',
      final_status:       statEl ? statEl.value : '',
    });
  }
  if (!updates.length) return toast('Tidak ada temuan yang perlu diverifikasi.', 'error');

  var btn     = document.getElementById('verif-submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:13px;height:13px;border-width:2px"></div> Memverifikasi...';

  try {
    await api('VERIFY_FINDINGS', {
      period_id: periodId,
      agenda_id: agendaId,
      updates:   updates,
    });
    clearCache('GET_ALL_FINDINGS_BY_PERIOD');
    clearCache('GET_FINDINGS_BY_AGENDA');
    toast('Verifikasi berhasil. Temuan sekarang bisa ditindaklanjuti auditee.', 'success');
    navigateTo('mytask');
  } catch(err) {
    toast(err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '<i data-lucide="shield-check" style="width:14px;height:14px"></i> Verifikasi Semua';
    lucide.createIcons();
  }
}

// ════════════════════════════════════════════════════════════
//  SUB-PAGE: ISI TPP (Auditee)
// ════════════════════════════════════════════════════════════

async function _renderIsiTppPage(container, task, period) {
  container.innerHTML =
    '<div class="page-loader"><div class="spinner dark"></div><span>Memuat...</span></div>';

  try {
    // Cek apakah sudah ada TPP sebelumnya (resubmit setelah reject)
    var existingItems = await api('GET_TPP_ITEMS', {
      period_id: period.period_id,
      result_id: task.result_id,
    });
    var log = await api('GET_APPROVAL_LOG', {
      period_id: period.period_id,
      result_id: task.result_id,
    });

    var f          = task.finding;
    var isResubmit = existingItems.length > 0;

    // Render history reject kalau ada
    var historyHtml = _renderApprovalHistory(log, 'TPP');

    container.innerHTML =
      _subPageHeader(
        'Isi TPP — ' + escHtml(task.agenda ? task.agenda.dept : ''),
        '#' + (f ? f.nomor_persyaratan + '.' + f.check_item_no : '')
      ) +

      // Info temuan
      '<div class="card mb-16"><div class="card-body" style="padding:14px 16px">' +
        '<div style="display:flex;gap:10px;align-items:flex-start">' +
          statusBadge(f ? f.status : '') +
          '<div style="flex:1;min-width:0">' +
            '<div style="font-size:13px;font-weight:600">' + escHtml(f ? f.deskripsi_temuan : '') + '</div>' +
            '<div style="font-size:11px;color:var(--text-muted);margin-top:3px">' +
              escHtml(task.agenda ? task.agenda.dept : '') +
              ' · #' + (f ? f.nomor_persyaratan + '.' + f.check_item_no : '') +
            '</div>' +
            (f && f.foto_urls
              ? '<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">' +
                  '<div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:6px;letter-spacing:.04em">FOTO BUKTI TEMUAN</div>' +
                  '<div style="display:flex;flex-wrap:wrap;gap:6px">' +
                    f.foto_urls.split(',').filter(Boolean).map(function(url) {
                      return '<a href="' + escHtml(url) + '" target="_blank" ' +
                        'class="btn btn-outline btn-sm" style="font-size:11px">' +
                        '<i data-lucide="image" style="width:11px;height:11px"></i> Lihat Foto</a>';
                    }).join('') +
                  '</div>' +
                '</div>'
              : '') +
          '</div>' +
        '</div>' +
      '</div></div>' +

      historyHtml +

      // Form TPP

function _renderTppItemInputs(tipe, items) {
  return items.map(function(item, i) {
    return '<div class="form-group" style="display:flex;gap:8px;align-items:flex-start" id="tpp-item-' + tipe + '-' + i + '">' +
      '<textarea class="form-control" id="tpp-input-' + tipe + '-' + i + '" rows="2" ' +
        'placeholder="' + (tipe === 'CORRECTION' ? 'Tindakan perbaikan segera...' : 'Rencana tindakan korektif jangka panjang...') + '">' +
        escHtml(item.deskripsi || '') +
      '</textarea>' +
      (i > 0
        ? '<button class="btn btn-ghost btn-icon" style="flex-shrink:0;margin-top:4px" ' +
            'onclick="document.getElementById(\'tpp-item-' + tipe + '-' + i + '\').remove()">' +
            '<i data-lucide="x" style="width:13px;height:13px;color:var(--text-muted)"></i>' +
          '</button>'
        : '<div style="width:32px"></div>') +
    '</div>';
  }).join('');
}

function _addTppItem(tipe) {
  var container = document.getElementById('tpp-' + (tipe === 'CORRECTION' ? 'corrections' : 'ca'));
  if (!container) return;
  var existing = container.querySelectorAll('[id^="tpp-item-' + tipe + '-"]');
  var nextIdx  = existing.length;
  var div = document.createElement('div');
  div.innerHTML = _renderTppItemInputs(tipe, [{ deskripsi: '' }]);
  // Re-index
  div.querySelectorAll('[id]').forEach(function(el) {
    el.id = el.id.replace(tipe + '-0', tipe + '-' + nextIdx);
  });
  container.appendChild(div.firstElementChild);
  lucide.createIcons();
}

async function _submitTpp(resultId, agendaId, periodId) {
  var targetDate = document.getElementById('tpp-target-date') ?
    document.getElementById('tpp-target-date').value : '';
  if (!targetDate) return toast('Target penyelesaian wajib diisi.', 'error');

  var items = [];
  // Kumpulkan corrections
  document.querySelectorAll('[id^="tpp-input-CORRECTION-"]').forEach(function(el) {
    var val = el.value.trim();
    if (val) items.push({ tipe: 'CORRECTION', deskripsi: val });
  });
  // Kumpulkan corrective actions
  document.querySelectorAll('[id^="tpp-input-CORRECTIVE_ACTION-"]').forEach(function(el) {
    var val = el.value.trim();
    if (val) items.push({ tipe: 'CORRECTIVE_ACTION', deskripsi: val });
  });

  if (!items.length) return toast('Isi minimal satu correction atau corrective action.', 'error');

  var btn      = document.getElementById('tpp-submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:13px;height:13px;border-width:2px"></div> Mengirim...';

  try {
    await api('SUBMIT_TPP', {
      period_id:   periodId,
      result_id:   resultId,
      agenda_id:   agendaId,
      items:       items,
      target_date: targetDate,
    });
    clearCache('GET_ALL_FINDINGS_BY_PERIOD');
    clearCache('GET_APPROVAL_LOG');
    clearCache('GET_TPP_ITEMS');
    toast('TPP berhasil disubmit. Menunggu approval Dept Head.', 'success');
    navigateTo('mytask');
  } catch(err) {
    toast(err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '<i data-lucide="send" style="width:14px;height:14px"></i> Submit TPP';
    lucide.createIcons();
  }
}

async function _processApproval(resultId, agendaId, periodId, stage, level, action) {
  var komentar = document.getElementById('apr-komentar') ?
    document.getElementById('apr-komentar').value.trim() : '';
  if (action === 'REJECTED' && !komentar) {
    return toast('Isi komentar alasan penolakan terlebih dahulu.', 'error');
  }

  var btnId   = action === 'APPROVED' ? 'apr-approve-btn' : 'apr-reject-btn';
  var btn     = document.getElementById(btnId);
  btn.disabled = true;

  try {
    await api('PROCESS_APPROVAL', {
      period_id: periodId,
      result_id: resultId,
      agenda_id: agendaId,
      action:    action,
      komentar:  komentar,
      // stage & level dihapus — derive dari finding_status di server
    });
    clearCache('GET_ALL_FINDINGS_BY_PERIOD');
    clearCache('GET_FINDINGS_BY_AGENDA');
    clearCache('GET_TPP_ITEMS');
    clearCache('GET_APPROVAL_LOG');
    toast(action === 'APPROVED' ? 'Berhasil di-approve.' : 'Ditolak. Auditee akan diberitahu.', 'success');
    navigateTo('mytask');
  } catch(err) {
    toast(err.message, 'error');
    btn.disabled = false;
  }
}

// ── Approval History ─────────────────────────────────────────

function _renderApprovalHistory(log, stage) {
  var relevant = (log || []).filter(function(l) {
    return l.stage === stage && l.action !== 'SUBMITTED';
  });
  if (!relevant.length) return '';

  return '<div class="card mb-16" style="border:1px solid var(--border)">' +
    '<div class="card-body" style="padding:12px 16px">' +
      '<div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:10px;letter-spacing:.06em">RIWAYAT APPROVAL</div>' +
      relevant.map(function(l) {
        var isApproved = l.action === 'APPROVED';
        var isSkipped  = l.skipped === true || l.skipped === 'TRUE';
        return '<div style="display:flex;gap:10px;align-items:flex-start;padding:6px 0;' +
          'border-bottom:1px solid var(--border)">' +
          '<div style="width:20px;height:20px;border-radius:50%;flex-shrink:0;' +
            'background:' + (isApproved ? 'var(--emerald,#10b981)' : 'var(--rose,#f43f5e)') + ';' +
            'display:flex;align-items:center;justify-content:center;margin-top:1px">' +
            '<i data-lucide="' + (isApproved ? 'check' : 'x') + '" ' +
              'style="width:11px;height:11px;color:#fff"></i>' +
          '</div>' +
          '<div style="flex:1;min-width:0">' +
            '<div style="font-size:12px;font-weight:600">' +
              escHtml(l.level) +
              (isSkipped ? ' <span class="badge badge-amber" style="font-size:10px">Skip</span>' : '') +
            '</div>' +
            '<div style="font-size:11px;color:var(--text-muted)">' +
              escHtml(l.by_email ? l.by_email.split('@')[0] : '') +
              ' · ' + formatDate(l.at) +
            '</div>' +
            (l.komentar
              ? '<div style="font-size:12px;margin-top:3px;color:' +
                  (isApproved ? 'var(--text)' : 'var(--rose)') + '">' +
                  escHtml(l.komentar) +
                '</div>'
              : '') +
            (isSkipped && l.skip_reason
              ? '<div style="font-size:11px;color:var(--amber,#f59e0b);margin-top:2px">' +
                  'Alasan skip: ' + escHtml(l.skip_reason) + '</div>'
              : '') +
          '</div>' +
        '</div>';
      }).join('') +
    '</div>' +
  '</div>';
}
</script>
