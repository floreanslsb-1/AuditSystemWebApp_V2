//  - Tombol "?" di sidebar untuk panggil ulang kapan saja

var _guideOverlay    = null;

var _guideTourSteps  = [];
var _guideTourIndex  = 0;
var _guideScrollEl   = null;

var GUIDE_LS_KEY = 'guide_welcomed_v1';

// ── Init — dipanggil dari renderSidebar setelah App.profile siap ─
function guideInit() {
  _guideInjectBtn();
  var seen = false;
  try { seen = !!localStorage.getItem(GUIDE_LS_KEY); } catch(e) {}
  if (!seen) {
    setTimeout(function() { guideShowWelcome(); }, 600);
  }
}

// ── Tombol "?" di sidebar ─────────────────────────────────────
function _guideInjectBtn() {
  if (document.getElementById('guide-help-btn')) return;
  var sidebar = document.getElementById('sidebar-nav');
  if (!sidebar) return;

  var btn = document.createElement('div');
  btn.id        = 'guide-help-btn';
  btn.title     = 'Panduan Penggunaan';
  btn.className = 'nav-item';
  btn.style.cssText = 'margin-top:auto;border-top:1px solid rgba(255,255,255,.08);padding-top:10px;margin-top:8px';
  btn.innerHTML =
    '<i data-lucide="help-circle" style="width:16px;height:16px;flex-shrink:0"></i>' +
    '<span class="nav-label">Panduan</span>';
  btn.onclick = function() { guideShowWelcome(true); };
  sidebar.appendChild(btn);
  if (window.lucide) lucide.createIcons(btn);
}

function _guideWelcomeClose() {
  var el = document.getElementById('guide-welcome-overlay');
  if (el) {
    el.style.opacity = '0';
    el.style.transition = 'opacity .2s';
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 200);
  }
}

function _guideWelcomeTour(page) {
  _guideWelcomeClose();
  setTimeout(function() {
    if (App.currentPage !== page) {
      navigateTo(page);
      setTimeout(function() { guideStartTour(page); }, 800);
    } else {
      guideStartTour(page);
    }
  }, 300);
}

function guideStartTour(page) {
  var steps = GUIDE_TOURS[page];
  if (!steps || !steps.length) return;

  _guideTourSteps  = steps;
  _guideTourIndex  = 0;
  _guideTourActive = true;

  _guideShowStep(0);
}

function _guideShowStep(index) {
  // Hapus tooltip lama
  _guideCleanup(false);

  if (index >= _guideTourSteps.length) {
    _guideEndTour();
    return;
  }

  var step = _guideTourSteps[index];
  var total = _guideTourSteps.length;

  // Cari elemen target
  var targetEl = step.target ? document.querySelector(step.target) : null;

  // Buat overlay backdrop
  var overlay = document.createElement('div');
  overlay.id = 'guide-tour-overlay';
  overlay.style.cssText =
    'position:fixed;inset:0;z-index:1900;pointer-events:none';

  // Backdrop gelap di luar highlight
  var backdrop = document.createElement('div');
  backdrop.id = 'guide-tour-backdrop';
  backdrop.style.cssText =
    'position:fixed;inset:0;background:rgba(15,31,61,.6);z-index:1900;pointer-events:all';
  backdrop.onclick = function(e) {
    if (e.target === backdrop) _guideNextStep();
  };
  document.body.appendChild(backdrop);

  var rect = null;
  if (targetEl) {
    rect = targetEl.getBoundingClientRect();
    // Scroll ke element kalau tidak terlihat
    targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });

    // Cutout highlight — pakai outline box
    var highlight = document.createElement('div');
    highlight.id = 'guide-tour-highlight';
    highlight.style.cssText =
      'position:fixed;' +
      'top:' + (rect.top - 6) + 'px;' +
      'left:' + (rect.left - 6) + 'px;' +
      'width:' + (rect.width + 12) + 'px;' +
      'height:' + (rect.height + 12) + 'px;' +
      'border-radius:10px;' +
      'box-shadow:0 0 0 4000px rgba(15,31,61,.6);' +
      'border:2px solid #06b6d4;' +
      'z-index:1901;pointer-events:none;' +
      'animation:_guidePulse 2s ease-in-out infinite';
    document.body.appendChild(highlight);
  }

  // Tooltip
  var tooltip = document.createElement('div');
  tooltip.id = 'guide-tour-tooltip';

  var progressDots = '';
  for (var i = 0; i < total; i++) {
    progressDots +=
      '<div style="width:' + (i === index ? '18' : '6') + 'px;height:6px;border-radius:3px;' +
        'background:' + (i === index ? '#06b6d4' : 'rgba(255,255,255,.3)') + ';' +
        'transition:all .25s"></div>';
  }

  tooltip.innerHTML =
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">' +
      '<div style="font-size:10px;font-weight:700;letter-spacing:.06em;color:#06b6d4;text-transform:uppercase">' +
        'PANDUAN ' + (index + 1) + ' / ' + total +
      '</div>' +
      '<button onclick="_guideEndTour()" ' +
        'style="width:22px;height:22px;border-radius:50%;border:none;background:rgba(255,255,255,.15);' +
          'color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1">' +
        '×' +
      '</button>' +
    '</div>' +
    '<div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:6px">' + escHtml(step.title) + '</div>' +
    '<div style="font-size:13px;color:rgba(255,255,255,.85);line-height:1.6;margin-bottom:14px">' + step.text + '</div>' +
    '<div style="display:flex;align-items:center;justify-content:space-between">' +
      '<div style="display:flex;gap:4px;align-items:center">' + progressDots + '</div>' +
      '<div style="display:flex;gap:8px">' +
        (index > 0
          ? '<button onclick="_guidePrevStep()" style="padding:7px 14px;border-radius:7px;border:1.5px solid rgba(255,255,255,.3);' +
              'background:transparent;color:#fff;font-size:12px;font-weight:600;cursor:pointer">← Kembali</button>'
          : '') +
        '<button onclick="_guideNextStep()" ' +
          'style="padding:7px 18px;border-radius:7px;border:none;' +
            'background:#06b6d4;color:#fff;font-size:13px;font-weight:700;cursor:pointer">' +
          (index === total - 1 ? 'Selesai ✓' : 'Lanjut →') +
        '</button>' +
      '</div>' +
    '</div>';

  tooltip.style.cssText =
    'position:fixed;z-index:1902;' +
    'background:linear-gradient(135deg,#0f1f3d,#1a3260);' +
    'border:1px solid rgba(6,182,212,.4);' +
    'border-radius:12px;padding:16px 18px;' +
    'width:320px;max-width:calc(100vw - 32px);' +
    'box-shadow:0 16px 40px rgba(0,0,0,.4);' +
    'animation:_guideSlideIn .25s ease';

  document.body.appendChild(tooltip);
  if (window.lucide) lucide.createIcons(tooltip);

  // Posisi tooltip
  _guidePositionTooltip(tooltip, rect, step.position);
}

function _guidePositionTooltip(tooltip, rect, position) {
  var tw = 320;
  var th = tooltip.offsetHeight || 180;
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  var margin = 16;

  var left, top;

  if (!rect || position === 'center') {
    // Center di layar
    left = Math.max(margin, (vw - tw) / 2);
    top  = Math.max(margin, (vh - th) / 2);
  } else if (position === 'bottom') {
    left = Math.max(margin, Math.min(rect.left, vw - tw - margin));
    top  = rect.bottom + 12;
    if (top + th > vh - margin) top = rect.top - th - 12;
  } else if (position === 'top') {
    left = Math.max(margin, Math.min(rect.left, vw - tw - margin));
    top  = rect.top - th - 12;
    if (top < margin) top = rect.bottom + 12;
  } else {
    left = Math.max(margin, (vw - tw) / 2);
    top  = Math.max(margin, (vh - th) / 2);
  }

  tooltip.style.left = left + 'px';
  tooltip.style.top  = top  + 'px';
}

function _guideNextStep() {
  _guideTourIndex++;
  _guideShowStep(_guideTourIndex);
}

function _guidePrevStep() {
  if (_guideTourIndex > 0) {
    _guideTourIndex--;
    _guideShowStep(_guideTourIndex);
  }
}

function _guideEndTour() {
  _guideTourActive = false;
  _guideCleanup(true);
  // Toast selamat
  if (typeof toast === 'function') toast('Tour selesai! Klik tombol Panduan di sidebar untuk melihat lagi.', 'success');
}

function _guideCleanup(full) {
  ['guide-tour-overlay','guide-tour-backdrop','guide-tour-highlight','guide-tour-tooltip'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el && el.parentNode) el.parentNode.removeChild(el);
  });
}

// ── CSS animasi (inject sekali) ───────────────────────────────
(function() {
  if (document.getElementById('guide-styles')) return;
  var style = document.createElement('style');
  style.id = 'guide-styles';
  style.textContent =
    '@keyframes _guideSlideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}' +
    '@keyframes _guidePulse{0%,100%{box-shadow:0 0 0 4000px rgba(15,31,61,.6),0 0 0 3px rgba(6,182,212,.5)}' +
      '50%{box-shadow:0 0 0 4000px rgba(15,31,61,.6),0 0 0 6px rgba(6,182,212,.2)}}';
  document.head.appendChild(style);
})();

</script>
