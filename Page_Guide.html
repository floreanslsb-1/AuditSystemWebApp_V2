<script>
// ============================================================
//  Page_Guide.html
//  In-app guided tour + welcome modal per role
//  - Welcome modal otomatis pertama kali (per perangkat, via localStorage)
//  - Tour per halaman: Dashboard, My Task, Hasil Audit
//  - Tombol "?" di sidebar untuk panggil ulang kapan saja
// ============================================================

// ── State ────────────────────────────────────────────────────
var _guideOverlay    = null;
var _guideTourActive = false;
var _guideTourSteps  = [];
var _guideTourIndex  = 0;
var _guideScrollEl   = null;

var GUIDE_LS_KEY = 'guide_welcomed_v1';

// ── Init — dipanggil dari renderSidebar setelah App.profile siap ─
function guideInit() {
  _guideInjectBtn();
  var seen = false;
  try { seen = !!localStorage.getItem(GUIDE_LS_KEY); } catch(e) {}
  if (!seen) {
    setTimeout(function() { guideShowWelcome(); }, 600);
  }
}

// ── Tombol "?" FAB pojok kanan bawah ─────────────────────────
function _guideInjectBtn() {
  if (document.getElementById('guide-help-btn')) return;

  var btn = document.createElement('button');
  btn.id        = 'guide-help-btn';
  btn.title     = 'Panduan Penggunaan';
  btn.innerHTML = '?';
  btn.onclick   = function() { _guideTourLauncher(); };
  btn.style.cssText =
    'position:fixed;bottom:28px;right:28px;z-index:1800;' +
    'width:44px;height:44px;border-radius:50%;border:none;' +
    'background:linear-gradient(135deg,#2563eb,#06b6d4);' +
    'color:#fff;font-size:20px;font-weight:800;line-height:1;' +
    'cursor:pointer;' +
    'box-shadow:0 4px 16px rgba(37,99,235,.45);' +
    'transition:transform .2s,box-shadow .2s;' +
    'display:flex;align-items:center;justify-content:center;';
  btn.onmouseenter = function() {
    this.style.transform  = 'scale(1.12)';
    this.style.boxShadow  = '0 6px 24px rgba(37,99,235,.6)';
  };
  btn.onmouseleave = function() {
    this.style.transform  = 'scale(1)';
    this.style.boxShadow  = '0 4px 16px rgba(37,99,235,.45)';
  };
  document.body.appendChild(btn);
}

// ════════════════════════════════════════════════════════════
//  WELCOME MODAL
// ════════════════════════════════════════════════════════════

function guideShowWelcome(forceShow) {
  var p = App.profile || {};

  // Kumpulkan semua role user
  var roles = [];
  if (p.isKoordinator) roles.push('koordinator');
  if (p.isAuditor)     roles.push('auditor');
  if (p.isDeptHead)    roles.push('depthead');
  if (p.isAuditee)     roles.push('auditee');
  if (!roles.length)   roles.push('viewer');

  _guideShowWelcomeAll(roles);
}

function _guideShowWelcomeAll(roles) {
  var p    = App.profile || {};
  var nama = (p.nama || 'Halo').split(' ')[0];

  var roleMeta = {
    koordinator: { icon:'shield-check', label:'Koordinator', color:'#2563eb',
      desc:'Verifikasi temuan & monitoring progress audit' },
    auditor:     { icon:'search',       label:'Auditor',     color:'#7c3aed',
      desc:'Lakukan audit & review implementasi tindak lanjut' },
    depthead:    { icon:'user-check',   label:'Dept Head',   color:'#0d9488',
      desc:'Approve implementasi tindak lanjut di departemenmu' },
    auditee:     { icon:'pencil',       label:'Auditee',     color:'#059669',
      desc:'Isi TPP & upload bukti implementasi temuan' },
    viewer:      { icon:'eye',          label:'Viewer',      color:'#64748b',
      desc:'Lihat progress dan laporan audit' },
  };

  // Badge chips untuk semua role
  var badgesHtml = roles.map(function(r) {
    var m = roleMeta[r] || roleMeta.viewer;
    return '<span style="display:inline-flex;align-items:center;gap:5px;' +
      'padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;' +
      'background:' + m.color + '18;color:' + m.color + ';border:1px solid ' + m.color + '33">' +
      '<i data-lucide="' + m.icon + '" style="width:11px;height:11px"></i>' +
      m.label +
    '</span>';
  }).join(' ');

  // Deskripsi tiap role
  var roleDescsHtml = roles.filter(function(r){ return r !== 'viewer'; }).map(function(r) {
    var m = roleMeta[r] || roleMeta.viewer;
    return '<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;' +
        'border-bottom:1px solid #f1f5f9">' +
      '<div style="width:30px;height:30px;border-radius:8px;background:' + m.color + '18;' +
        'display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">' +
        '<i data-lucide="' + m.icon + '" style="width:13px;height:13px;color:' + m.color + '"></i>' +
      '</div>' +
      '<div>' +
        '<div style="font-size:12px;font-weight:700;color:#0f172a">' + m.label + '</div>' +
        '<div style="font-size:11px;color:#64748b;margin-top:2px">' + m.desc + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  var html =
    '<div id="guide-welcome-overlay" style="position:fixed;inset:0;background:rgba(15,31,61,.55);' +
      'backdrop-filter:blur(4px);z-index:2000;display:flex;align-items:center;justify-content:center;' +
      'padding:20px;overflow-y:auto">' +
      '<div style="background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.18);' +
        'width:100%;max-width:420px;animation:_guideSlideIn .3s ease;margin:auto">' +

        // Header
        '<div style="padding:24px 24px 16px;border-bottom:1px solid #f1f5f9">' +
          '<div style="font-size:22px;margin-bottom:6px">👋</div>' +
          '<div style="font-size:20px;font-weight:800;color:#0f172a;margin-bottom:8px">' +
            'Halo, ' + escHtml(nama) + '!' +
          '</div>' +
          '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">' +
            badgesHtml +
          '</div>' +
          '<div style="font-size:13px;color:#64748b;line-height:1.6">' +
            'Selamat datang di Sistem IMS Audit. Mau lihat panduan cara pakai aplikasi ini?' +
          '</div>' +
        '</div>' +

        // Role descriptions
        (roleDescsHtml
          ? '<div style="padding:12px 24px 4px">' +
              '<div style="font-size:10px;font-weight:700;letter-spacing:.07em;color:#94a3b8;margin-bottom:6px">AKSESMU DI SISTEM INI</div>' +
              roleDescsHtml +
            '</div>'
          : '') +

        // Footer
        '<div style="padding:16px 24px 20px;display:flex;gap:10px">' +
          '<button onclick="_guideWelcomeClose()" ' +
            'style="padding:10px 16px;border-radius:8px;border:1.5px solid #e2e8f0;' +
              'background:transparent;font-size:13px;font-weight:600;color:#64748b;cursor:pointer">' +
            'Lewati' +
          '</button>' +
          '<button onclick="_guideStartAutoTour()" ' +
            'style="flex:1;padding:10px 16px;border-radius:8px;border:none;' +
              'background:linear-gradient(135deg,#2563eb,#06b6d4);color:#fff;' +
              'font-size:13px;font-weight:700;cursor:pointer;' +
              'display:flex;align-items:center;justify-content:center;gap:6px">' +
            '<i data-lucide="play-circle" style="width:15px;height:15px"></i>' +
            'Mulai Tour' +
          '</button>' +
        '</div>' +

      '</div>' +
    '</div>';

  var existing = document.getElementById('guide-welcome-overlay');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', html);
  if (window.lucide) lucide.createIcons(document.getElementById('guide-welcome-overlay'));
  try { localStorage.setItem(GUIDE_LS_KEY, '1'); } catch(e) {}
}

        { icon: 'table-2',       text: '<strong>Hasil Audit</strong> memperlihatkan status semua temuan di area yang kamu audit.' },
        { icon: 'bell',          text: 'Notifikasi email dikirim saat ada submission implementasi yang menunggu review kamu.' },

    },
    auditee: {

      tagline:  'Kamu bertugas mengisi rencana tindak lanjut dan mengupload bukti implementasi.',

        { icon: 'camera',        text: 'Setelah melaksanakan tindakan, buka <strong>My Task → Upload Implementasi</strong> dan upload foto bukti beserta keterangan.' },
        { icon: 'clock',         text: 'Perhatikan <strong>due date</strong> — temuan yang melewati due date akan ditandai Overdue di dashboard.' },
        { icon: 'bell',          text: 'Kamu akan menerima email reminder kalau ada temuan yang belum diselesaikan.' },
      ],
      tourLabel:  'Mulai Tour',
      tourTarget: 'mytask',
      extraTours: ['dashboard', 'hasil-audit'],
    },
    viewer: {
      color:    '#64748b',
      icon:     'eye',
      badge:    'Viewer',
      tagline:  'Kamu dapat memantau progress audit tanpa dapat mengubah data.',
      steps: [
        { icon: 'bar-chart-2',   text: '<strong>Dashboard</strong> menampilkan ringkasan progress audit dan status tindak lanjut per area.' },
        { icon: 'table-2',       text: '<strong>Hasil Audit</strong> memperlihatkan semua temuan Non Comply beserta status correction dan corrective action.' },
      ],

  var c = roleContent[role];

      '</div>' +
      '<div style="font-size:13px;color:#374151;line-height:1.6">' + s.text + '</div>' +

  var html =
    '<div id="guide-welcome-overlay" style="position:fixed;inset:0;background:rgba(15,31,61,.55);' +

        '<div style="padding:8px 24px 16px">' +

                '<i data-lucide="play-circle" style="width:15px;height:15px"></i>' +
                escHtml(c.tourLabel) +
              '</button>' +
              (c.extraTours && c.extraTours.length
                ? '<div style="width:100%;display:flex;gap:8px;flex-wrap:wrap">' +
                    c.extraTours.map(function(t) {
                      var lbl = { 'dashboard':'Tour Dashboard', 'hasil-audit':'Tour Hasil Audit', 'mytask':'Tour My Task' };
                      return '<button onclick="_guideWelcomeTour(\'' + t + '\')" ' +
                        'style="flex:1;padding:8px 12px;border-radius:8px;border:1.5px solid ' + c.color + ';' +
                          'background:transparent;color:' + c.color + ';font-size:12px;font-weight:600;cursor:pointer">' +
                        (lbl[t] || t) +
                      '</button>';
                    }).join('') +
                  '</div>'
                : '')
            : '') +
          '<button onclick="_guideWelcomeClose()" ' +
            'style="' + (c.tourLabel ? '' : 'flex:1;') + 'padding:10px 16px;border-radius:8px;border:1.5px solid #e2e8f0;' +
              'background:transparent;font-size:13px;font-weight:600;color:#64748b;cursor:pointer">' +
            (c.tourLabel ? 'Lewati' : 'Mengerti') +
          '</button>' +
        '</div>' +

      '</div>' +
    '</div>';

  // Inject overlay

function _guideShowRoleSelector(roles) {

  var nama = (p.nama || 'Halo').split(' ')[0];

  var roleMeta = {
    koordinator: { icon: 'shield-check', label: 'Koordinator',   color: '#2563eb', desc: 'Verifikasi temuan & monitoring progress' },
    auditor:     { icon: 'search',       label: 'Auditor',       color: '#7c3aed', desc: 'Review implementasi tindak lanjut' },
    depthead:    { icon: 'user-check',   label: 'Dept Head',     color: '#0d9488', desc: 'Approve implementasi di departemenmu' },
    auditee:     { icon: 'pencil',       label: 'Auditee',       color: '#059669', desc: 'Isi TPP & upload bukti implementasi' },
  };

  var cardsHtml = roles.map(function(r) {
    var m = roleMeta[r];
    return '<button onclick="_guideSelectRole(\'' + r + '\')" ' +
      'style="width:100%;text-align:left;padding:12px 14px;border-radius:10px;' +
        'border:1.5px solid #e2e8f0;background:#fff;cursor:pointer;' +
        'display:flex;align-items:center;gap:12px;transition:all .15s;' +
        'margin-bottom:8px" ' +
      'onmouseover="this.style.borderColor=\'' + m.color + '\';this.style.background=\'' + m.color + '10\'" ' +
      'onmouseout="this.style.borderColor=\'#e2e8f0\';this.style.background=\'#fff\'">' +
      '<div style="width:36px;height:36px;border-radius:9px;background:' + m.color + '18;' +
        'display:flex;align-items:center;justify-content:center;flex-shrink:0">' +
        '<i data-lucide="' + m.icon + '" style="width:16px;height:16px;color:' + m.color + '"></i>' +
      '</div>' +
      '<div>' +
        '<div style="font-size:13px;font-weight:700;color:#0f172a">' + m.label + '</div>' +
        '<div style="font-size:12px;color:#64748b">' + m.desc + '</div>' +
      '</div>' +
      '<i data-lucide="chevron-right" style="width:14px;height:14px;color:#cbd5e1;margin-left:auto;flex-shrink:0"></i>' +
    '</button>';
  }).join('');

  var html =
    '<div id="guide-welcome-overlay" style="position:fixed;inset:0;background:rgba(15,31,61,.55);' +
      'backdrop-filter:blur(4px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px">' +
      '<div style="background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.18);' +
        'width:100%;max-width:420px;animation:_guideSlideIn .3s ease">' +

        '<div style="padding:24px 24px 16px;border-bottom:1px solid #f1f5f9">' +
          '<div style="font-size:18px;font-weight:800;color:#0f172a;margin-bottom:4px">Halo, ' + escHtml(nama) + '! 👋</div>' +
          '<div style="font-size:13px;color:#64748b">Kamu punya beberapa role. Mau lihat panduan sebagai apa?</div>' +
        '</div>' +

        '<div style="padding:16px 24px">' + cardsHtml + '</div>' +

        '<div style="padding:0 24px 20px">' +
          '<button onclick="_guideWelcomeClose()" ' +
            'style="width:100%;padding:10px;border-radius:8px;border:1.5px solid #e2e8f0;' +
              'background:transparent;font-size:13px;font-weight:600;color:#64748b;cursor:pointer">' +
            'Lewati' +
          '</button>' +
        '</div>' +

      '</div>' +
    '</div>';

  var existing = document.getElementById('guide-welcome-overlay');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', html);
  if (window.lucide) lucide.createIcons(document.getElementById('guide-welcome-overlay'));
  try { localStorage.setItem(GUIDE_LS_KEY, '1'); } catch(e) {}

function _guideSelectRole(role) {
  _guideWelcomeClose();
  setTimeout(function() { _guideShowWelcomeForRole(role); }, 200);
}

function _guideWelcomeClose() {
  var el = document.getElementById('guide-welcome-overlay');
  if (el) {
    el.style.opacity = '0';
    el.style.transition = 'opacity .2s';
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 200);
  }
}

function _guideWelcomeTour(page) {
  _guideWelcomeClose();
  setTimeout(function() {
    if (page === 'mytask') {
      _guideMyTaskRoleSelector();
      return;
    }
    if (App.currentPage !== page) {
      navigateTo(page);
      setTimeout(function() { guideStartTour(page); }, 800);
    } else {
      guideStartTour(page);
    }
  }, 300);
}

// ── Role selector khusus untuk Tour My Task ───────────────────
function _guideMyTaskRoleSelector() {
  var p = App.profile || {};

  // Kumpulkan semua role yang relevan untuk My Task
  var roles = [];
  if (p.isKoordinator) roles.push('koordinator');
  if (p.isAuditor)     roles.push('auditor');
  if (p.isDeptHead)    roles.push('depthead');
  if (p.isAuditee)     roles.push('auditee');
  if (!roles.length)   roles.push('viewer');

  // Kalau hanya 1 role, langsung mulai tour tanpa selector
  if (roles.length === 1) {
    _guideStartMyTaskTour(roles[0]);
    return;
  }

  // Tampilkan selector role
  var roleMeta = {
    koordinator: { icon: 'shield-check', label: 'Koordinator', color: '#2563eb', desc: 'Verifikasi temuan dari auditor' },
    auditor:     { icon: 'search',       label: 'Auditor',     color: '#7c3aed', desc: 'Review implementasi tindak lanjut' },
    depthead:    { icon: 'user-check',   label: 'Dept Head',   color: '#0d9488', desc: 'Approve implementasi departemen' },
    auditee:     { icon: 'pencil',       label: 'Auditee',     color: '#059669', desc: 'Isi TPP & upload bukti implementasi' },
  };

  var cardsHtml = roles.map(function(r) {
    var m = roleMeta[r];
    return '<button onclick="_guideMyTaskRolePick(\'' + r + '\')" ' +
      'style="width:100%;text-align:left;padding:12px 14px;border-radius:10px;' +
        'border:1.5px solid #e2e8f0;background:#fff;cursor:pointer;' +
        'display:flex;align-items:center;gap:12px;transition:all .15s;margin-bottom:8px" ' +

// ── Auto tour berurutan: Dashboard → Hasil Audit → My Task ───
var _guideAutoTourQueue  = [];  // sisa halaman yang akan di-tour
var _guideAutoTourRoles  = [];  // sisa role My Task yang akan di-tour

function _guideStartAutoTour() {
  _guideWelcomeClose();
  var p = App.profile || {};

  // Kumpulkan role My Task
  var myTaskRoles = [];
  if (p.isKoordinator) myTaskRoles.push('koordinator');
  if (p.isAuditor)     myTaskRoles.push('auditor');
  if (p.isDeptHead)    myTaskRoles.push('depthead');
  if (p.isAuditee)     myTaskRoles.push('auditee');
  if (!myTaskRoles.length) myTaskRoles.push('viewer');

  _guideAutoTourQueue = ['dashboard', 'hasil-audit', 'mytask'];
  _guideAutoTourRoles = myTaskRoles;

  setTimeout(_guideAutoTourNext, 300);
}

function _guideAutoTourNext() {
  if (!_guideAutoTourQueue.length) return; // semua selesai

  var page = _guideAutoTourQueue.shift();

  if (page === 'mytask') {
    // My Task: jalankan per role, tanya user setiap ganti role
    _guideAutoTourMyTask();
    return;
  }

  // Navigasi ke halaman lalu mulai tour
  if (App.currentPage !== page) {
    navigateTo(page);
    setTimeout(function() {
      guideStartTour(page);
      // Lanjut ke halaman berikutnya setelah tour selesai
      _guideOnTourEndCallback = _guideAutoTourNext;
    }, 800);
  } else {
    guideStartTour(page);
    _guideOnTourEndCallback = _guideAutoTourNext;
  }
}

function _guideAutoTourMyTask() {
  if (!_guideAutoTourRoles.length) return; // semua role selesai

  var role = _guideAutoTourRoles.shift();
  var hasMore = _guideAutoTourRoles.length > 0;

  // Navigasi ke My Task lalu start tour role ini
  var startTour = function() {
    guideStartTour('mytask-' + role);
    _guideOnTourEndCallback = hasMore
      ? function() { _guideAskNextRole(_guideAutoTourRoles[0]); }
      : null;
  };

  if (App.currentPage !== 'mytask') {
    navigateTo('mytask');
    setTimeout(startTour, 800);
  } else {
    startTour();
  }
}

      navigateTo(page);

    } else {
      guideStartTour(page);
    }
  }, 300);
}

function guideStartTour(page) {
  var steps = GUIDE_TOURS[page];
  if (!steps || !steps.length) return;

  _guideTourSteps  = steps;
  _guideTourIndex  = 0;
  _guideTourActive = true;

  _guideShowStep(0);
}

function _guideShowStep(index) {
  // Hapus tooltip lama
  _guideCleanup(false);

  if (index >= _guideTourSteps.length) {
    _guideEndTour();
    return;
  }

  var step = _guideTourSteps[index];
  var total = _guideTourSteps.length;

  // Cari elemen target
  var targetEl = step.target ? document.querySelector(step.target) : null;

  // Skip step ini kalau elemen tidak ada di DOM dan step ditandai _skipIfMissing
  if (!targetEl && step.target && step._skipIfMissing) {
    _guideTourIndex++;
    _guideShowStep(_guideTourIndex);
    return;
  }

  // Buat overlay backdrop
  var overlay = document.createElement('div');
  overlay.id = 'guide-tour-overlay';
  overlay.style.cssText =
    'position:fixed;inset:0;z-index:1900;pointer-events:none';

  // Backdrop gelap di luar highlight
  var backdrop = document.createElement('div');
  backdrop.id = 'guide-tour-backdrop';
  backdrop.style.cssText =
    'position:fixed;inset:0;background:rgba(15,31,61,.6);z-index:1900;pointer-events:all';
  backdrop.onclick = function(e) {
    if (e.target === backdrop) _guideNextStep();
  };
  document.body.appendChild(backdrop);

  var rect = null;
  if (targetEl) {
    targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // Tooltip dulu (tanpa highlight), posisi center sementara
  var tooltip = document.createElement('div');
  tooltip.id = 'guide-tour-tooltip';

  var progressDots = '';
  for (var i = 0; i < total; i++) {
    progressDots +=
      '<div style="width:' + (i === index ? '18' : '6') + 'px;height:6px;border-radius:3px;' +
        'background:' + (i === index ? '#06b6d4' : 'rgba(255,255,255,.3)') + ';' +
        'transition:all .25s"></div>';
  }

  tooltip.innerHTML =
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">' +
      '<div style="font-size:10px;font-weight:700;letter-spacing:.06em;color:#06b6d4;text-transform:uppercase">' +
        'PANDUAN ' + (index + 1) + ' / ' + total +
      '</div>' +
      '<button onclick="_guideEndTour()" ' +
        'style="width:22px;height:22px;border-radius:50%;border:none;background:rgba(255,255,255,.15);' +
          'color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1">' +
        '×' +
      '</button>' +
    '</div>' +
    '<div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:6px">' + escHtml(step.title) + '</div>' +
    '<div style="font-size:13px;color:rgba(255,255,255,.85);line-height:1.6;margin-bottom:14px">' + step.text + '</div>' +
    '<div style="display:flex;align-items:center;justify-content:space-between">' +
      '<div style="display:flex;gap:4px;align-items:center">' + progressDots + '</div>' +
      '<div style="display:flex;gap:8px">' +
        (index > 0
          ? '<button onclick="_guidePrevStep()" style="padding:7px 14px;border-radius:7px;border:1.5px solid rgba(255,255,255,.3);' +
              'background:transparent;color:#fff;font-size:12px;font-weight:600;cursor:pointer">← Kembali</button>'
          : '') +
        '<button onclick="_guideNextStep()" ' +
          'style="padding:7px 18px;border-radius:7px;border:none;' +
            'background:#06b6d4;color:#fff;font-size:13px;font-weight:700;cursor:pointer">' +
          (index === total - 1 ? 'Selesai ✓' : 'Lanjut →') +
        '</button>' +
      '</div>' +
    '</div>';

  tooltip.style.cssText =
    'position:fixed;z-index:1902;' +
    'background:linear-gradient(135deg,#0f1f3d,#1a3260);' +
    'border:1px solid rgba(6,182,212,.4);' +
    'border-radius:12px;padding:16px 18px;' +
    'width:320px;max-width:calc(100vw - 32px);' +
    'box-shadow:0 16px 40px rgba(0,0,0,.4);' +
    'opacity:0;transition:opacity .2s ease';

  document.body.appendChild(tooltip);
  if (window.lucide) lucide.createIcons(tooltip);

  // Render highlight + posisi tooltip setelah scroll selesai
  var _scrollDelay = targetEl ? 600 : 50;
  setTimeout(function() {
    if (targetEl) {
      rect = targetEl.getBoundingClientRect();
      var hl = document.getElementById('guide-tour-highlight');
      if (hl) hl.parentNode.removeChild(hl);
      var highlight = document.createElement('div');
      highlight.id = 'guide-tour-highlight';
      // Backdrop: 4 panel gelap mengelilingi highlight (atas, bawah, kiri, kanan)
      var bdr = document.getElementById('guide-tour-backdrop');
      if (bdr) bdr.style.background = 'transparent';

      var x = rect.left - 6, y = rect.top - 6;
      var w = rect.width + 12;
      var h = step.maxHeight
        ? Math.min(rect.height + 12, step.maxHeight)
        : rect.height + 12;
      var vw = window.innerWidth, vh = window.innerHeight;
      var panels = [
        { top:0,     left:0,  width:vw,       height:y },           // atas
        { top:y+h,   left:0,  width:vw,       height:vh-(y+h) },    // bawah
        { top:y,     left:0,  width:x,        height:h },           // kiri
        { top:y,     left:x+w,width:vw-(x+w), height:h },           // kanan
      ];
      panels.forEach(function(p, i) {
        var panel = document.createElement('div');
        panel.className = 'guide-backdrop-panel';
        panel.style.cssText =
          'position:fixed;background:rgba(15,31,61,.62);z-index:1901;pointer-events:all;' +
          'top:' + p.top + 'px;left:' + p.left + 'px;' +
          'width:' + p.width + 'px;height:' + p.height + 'px';
        panel.onclick = function() { _guideNextStep(); };
        document.body.appendChild(panel);
      });

      // Border highlight — kotak, transparan di dalam
      highlight.style.cssText =
        'position:fixed;' +
        'top:' + y + 'px;left:' + x + 'px;' +
        'width:' + w + 'px;height:' + h + 'px;' +
        'border-radius:8px;' +
        'border:2px solid #06b6d4;' +
        'box-shadow:0 0 16px rgba(6,182,212,.6);' +
        'background:transparent;' +
        'z-index:1902;pointer-events:none;' +
        'animation:_guidePulse 2s ease-in-out infinite';
      document.body.appendChild(highlight);
    }
    var tt = document.getElementById('guide-tour-tooltip');
    if (tt) {
      _guidePositionTooltip(tt, rect, step.position);
      tt.style.opacity = '1';
      tt.style.animation = '_guideSlideIn .25s ease';
    }
  }, _scrollDelay);
}

function _guidePositionTooltip(tooltip, rect, position) {
  var tw = 320;
  var th = tooltip.offsetHeight || 180;
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  var margin = 16;

  var left, top;

  if (!rect || position === 'center') {
    // Center di layar
    left = Math.max(margin, (vw - tw) / 2);
    top  = Math.max(margin, (vh - th) / 2);
  } else if (position === 'bottom') {
    left = Math.max(margin, Math.min(rect.left, vw - tw - margin));
    top  = rect.bottom + 12;
    if (top + th > vh - margin) top = rect.top - th - 12;
  } else if (position === 'top') {
    left = Math.max(margin, Math.min(rect.left, vw - tw - margin));
    top  = rect.top - th - 12;
    if (top < margin) top = rect.bottom + 12;
    if (top + th > vh - margin) top = Math.max(margin, (vh - th) / 2);
  } else {
    left = Math.max(margin, (vw - tw) / 2);
    top  = Math.max(margin, (vh - th) / 2);
  }

  tooltip.style.left = left + 'px';
  tooltip.style.top  = top  + 'px';
}

function _guideNextStep() {
  _guideTourIndex++;
  _guideShowStep(_guideTourIndex);
}

function _guidePrevStep() {
  if (_guideTourIndex > 0) {
    _guideTourIndex--;
    _guideShowStep(_guideTourIndex);
  }
}

function _guideEndTour() {
  _guideTourActive = false;
  _guideCleanup(true);
  // Toast selamat
  if (typeof _guideOnTourEndCallback === 'function') {
    var cb = _guideOnTourEndCallback;
    _guideOnTourEndCallback = null;
    setTimeout(cb, 400);
  } else {
    var endHtml =
      '<div id="guide-welcome-overlay" style="position:fixed;inset:0;background:rgba(15,31,61,.45);' +
        'backdrop-filter:blur(3px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px">' +
        '<div style="background:#fff;border-radius:14px;box-shadow:0 16px 48px rgba(0,0,0,.16);' +
          'width:100%;max-width:340px;padding:24px;animation:_guideSlideIn .25s ease;text-align:center">' +
          '<div style="font-size:28px;margin-bottom:12px">🎉</div>' +
          '<div style="font-size:16px;font-weight:800;color:#0f172a;margin-bottom:8px">Tour selesai!</div>' +
          '<div style="font-size:13px;color:#64748b;line-height:1.6;margin-bottom:20px">' +
            'Butuh panduan lagi? Klik tombol ' +
            '<span style="display:inline-flex;align-items:center;justify-content:center;' +
              'width:22px;height:22px;border-radius:50%;' +
              'background:linear-gradient(135deg,#2563eb,#06b6d4);' +
              'color:#fff;font-size:13px;font-weight:800;vertical-align:middle;margin:0 2px">?</span>' +
            ' di pojok kanan bawah layar kapan saja.' +
          '</div>' +
          '<button onclick="_guideWelcomeClose()" ' +
            'style="width:100%;padding:10px 16px;border-radius:8px;border:none;' +
              'background:linear-gradient(135deg,#2563eb,#06b6d4);color:#fff;' +
              'font-size:13px;font-weight:700;cursor:pointer">' +
            'Oke, mengerti!' +
          '</button>' +
        '</div>' +
      '</div>';
    var existing = document.getElementById('guide-welcome-overlay');
    if (existing) existing.remove();
    document.body.insertAdjacentHTML('beforeend', endHtml);
  }
}

function _guideCleanup(full) {
  ['guide-tour-overlay','guide-tour-backdrop','guide-tour-highlight','guide-tour-tooltip'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el && el.parentNode) el.parentNode.removeChild(el);
  });
  // Hapus backdrop panels
  document.querySelectorAll('.guide-backdrop-panel').forEach(function(el) {
    if (el.parentNode) el.parentNode.removeChild(el);
  });
}

// ── CSS animasi (inject sekali) ───────────────────────────────
(function() {
  if (document.getElementById('guide-styles')) return;
  var style = document.createElement('style');
  style.id = 'guide-styles';
  style.textContent =
    '@keyframes _guideSlideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}' +
    '@keyframes _guidePulse{0%,100%{box-shadow:0 0 0 0 rgba(6,182,212,.5)}' +
      '50%{box-shadow:0 0 0 4px rgba(6,182,212,.2)}}';
  document.head.appendChild(style);
})();

</script>
